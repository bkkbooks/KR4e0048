body:
  text: 西菴集巻八明孫蕡撰五言排律朝雲并序庚戌十月余與二客自五仙城泛舟遊羅浮道出合江訪東坡白鶴峯遺址還艤舟西湖小蘇堤下夜登棲禪寺留宿精舍時薄寒中霜月如晝山深悄無人聲二客醉卧僧榻上余獨散步東廊壁光皎潔若雪隠約有字急呼小童篝燈讀之字體流麗飛動似倣衛夫人書法詩凡十首皆集古語而成者其一曰家住錢塘東復東偶來江外寄行蹤三湘愁鬢逢秋色半壁殘燈照病容艶骨已成蘭麝土露華偏濕蕋珠宫分明記得還家夢一路寒山萬木中其二曰妾本錢塘江上住雙垂别淚越江邊鶴歸華表添新塚燕蹴飛花落舞筵野草怕霜霜怕日月光如水水如天人間俯仰成今古祇是當時已惘然其三曰三生石上舊精魂化作陽臺一段雲詞客有靈應識我碧山如畫又逢君花邊古木翔金雀竹裏香雲冷翠裙莫向西湖歌此曲清明時節雨紛紛其四曰東望望春春可憐江蘺漠漠荇田田遶籬野菜飛黄蝶糝徑楊花鋪白氊雲近蓬萊長五色鶴歸華表已千年夢囘明月生南浦淚血染成紅杜鵑其五曰浮雲漠漠草離離淚濕春衫鬂脚垂秋水為神玉為骨芙蓉如面栁如眉鐘隨野艇囘孤棹蟬曳殘聲過别枝青塚路邊南雁盡問君何事到天涯其六曰身前身後事茫茫惱㫁蘇州刺史腸猿帶玉環歸後洞君騎白馬傍垂楊鶴羣長遶三株樹花氣渾如百和香慚愧情人逺相訪為郎憔悴却羞郎其七曰孤月無情掛翠巒金爐香燼漏聲殘雲収雨散知何處鬂亂釵横特地寒去日漸多來日少别時容易見時難明朝有約誰先到青鳥殷勤為探㸔其八曰杏花疎雨立黄昏金屋無人見淚痕短鬂欲星愁有效此身雖異性常存關門不鎖寒溪水環珮空歸月夜魂倚柱尋思倍惆悵夜寒皺玉倩誰温其九曰萬紫千紅緫是春登臨一度一思君舞低楊栁樓心月香濕梨花夢裏雲風景蒼蒼多少恨隂蟲切切不堪聞思君今夜腸應㫁書破羊欣白練裙其十曰零落殘雲倍黯然一身憔悴對花眠南園緑草飛蝴蝶落日空山怨杜䳌天若有情天亦老月如無恨月長圓此聲腸㫁非今日風景依稀似去年其後復書羅浮王仙姑月夜過此有感而賦予驚曰此非仙語乃人間意態也方欲再諦視而燈為北風所滅晦林木淅瀝作山鬼聲予毛髮森竪不敢乆立即還室掩户踉蹡而卧夢一美人上衣紅絹衣下繫荷絲裙從花隂中來年可二十六七竒葩逸麗光奪人目風鬟霧鬢颯然凄冷殆不類人世中所見者彷彿若有金支翠蕤導從其前後隔水先聞歌聲似呉人語予側足傾耳竦身聴之則悠揚宛轉欲㫁還續半空松栢作簫笙聲助其清婉而螿蚓唧唧為之擊節其詞曰舞衫歌扇舊因縁萬事傷心在眼前雲物不殊鄉國異夭桃窓下背花眠烟籠寒水月籠沙誰信流年鬢有華燕子銜將春色去夢中猶記詠梅花青山隠隠水迢迢客夢都隨嵗月消惟有别時今不忘水邊楊栁赤欄橋杜陵寒食草青青長誦金剛般若經雨冷雲香弔仙客夢中同躡鳳凰翎逺上寒山石徑斜宫前楊栁寺前花紅顔未老恩先斷莫怨東風當自嗟與君别約記杭州山外青山樓外樓屈指别來經幾載愁心一倍長離憂旅館寒燈獨不眠湘波冷浸一枝蓮何時最是思君處月落烏啼霜滿天欲寫愁腸媿不才依稀猶記妙髙臺問余别恨知多少巴蜀雪消春水來紫烟衣上繡春雲一樹繁花對古墳辛苦無歡容不理半縁修道半縁君春愁冉冉帶餘酲珍簟銀床夢不成知子逺來應有意酷憐風月為多情光隂卒卒一飛梭怨入東風芳草多舊枕未容春夢斷秦霜楚雨暗相和身前身後思茫茫秋菊春蘭各吐芳慚愧情人逺相訪為郎憔悴却羞郎歌已復續拗體詩三首白袷玉郎寄桃葉金鞍駿馬呼小妾翠眉蟬鬢生别離南園緑草飛蝴蝶野棠開盡飄香玉細栁新蒲為誰緑忽忽窮愁泥殺人逢人更唱相思曲瞿塘嘈嘈十二灘遶船明月江水寒欲隨郎船㸔明月遊絲落絮春漫漫其聲哀而不傷怨而有容亹亹而不窮如孤鳳之鳴梧桐雌龍之吟水中也歌闋予不覺泣下亟趨見之環珮歴落餘音猶泠然異香馥郁襲人沁入肌骨含涕作羞態已而謂予曰君知妾之來意耶妾乃錢塘歌者眉山蘇長公妾也公昔南遷諸侍姬皆雲鳥散去獨妾結衣從之巾櫛之餘吟弄筆墨粗識其風致晚得泗上比丘尼教誦金剛釋典頗悟佛法今淪落於兹無所復恨但幽情婉意鬱鬱無相知者方將鎔金而鑄子期買絲而繡平原江波悠悠嵗月延佇君富有文采思如流泉獨弗能吐胸中華藻少慰妾之岑寂耶古人有云心誠同隔世通不投機促膝離千載而下君之情思惟妾知之耳言訖倐忽不見予亦驚覺莫察其由詰旦尋壁間字已漫滅不可復辨詢之寺僧則曰寺南有王氏朝雲之墓今數百年矣焄蒿悽愴時露光景豈或其餘魂也耶予為怛然自失者即日既陳椒漿酹之復竊髙唐洛神之意為詩用紀其事凡一百韻悼粉香之零亂寫溟漠之幽姿纒綿悽惋宛然思婦呻吟之聲非獨以慰朝雲亦聊以自悼云爾思斷蘭臺路愁填濯錦川錢塘清楚㑹金谷狹斜聫少負傾城譽名居弄玉先十三工寫月二八擅韶年束素宫腰怯凝脂國色鮮倚風楊栁弱炙日海棠嫣跳脱鬆籠腕琵琶重妥肩塗黄勻漢靨安寫破秦鉛緑水酣潘岳紅顔惱董賢流霞紅錯落嬌燕掠鞦韆舞壓梨園社歌翻樂府編彩雲生袖底璧月墮樓前鏡掩三星曙春隨五馬韉青樓辭女伴瓊珮挹詩仙蠟炬催傳賜烏絲侍草𤣥娉婷驚世外風度掩雲邊霜撲罘罳畫隂横粉署塼逆鱗天咫尺埀翅路三千黛減蛾眉翠筝斜蜀國絃武林牽北望庾嶺入南遷白鶴峯千尺黄茅屋數椽練裙㕘般若彤管搨張顛蜜鯽調蘇合邉爐淪海膻㫁霞丹荔嶼晴雪素馨田妾命真成薄郎行底未旋塵蒙纓絡串珠軃步揺鈿往事腸堪折殊方瘴莫痊烓童占吉卜鄰媪訪沉綿楚峽深秋氣羅浮澹曉妍巫陽招古些卞女泣新阡海氣籠翹鳳嵐光濕鬢蟬封嚢留粉恨長帽㫁塵縁隴樹含悽緑經文帶淚鐫雪兒低鶴馭雲母凍龍涎桃葉生前渡梅花夢裏天蛾旋三昧火鸚弔六如禪入道應偷藥凌虛想步蓮浴蘭依静土遺玦贈靈荃天路雲和峭瑤池脉望圓迴鸞珠斗没驚鵲玉繩偏木落山精笑苔平石獸眠香雲啼子夜慧魄閟重泉絡緯停寒索飛簾捲夕旃譜餘蘇小曲書暗薛濤箋亂緒紛團結新知永棄捐屏幃空孔雀衿繡冷文鴛清吹羣真下叢林積水連幽扄螢擾擾舊業草芊芊巴舞陳椒醑呉歈裂楮錢霓裳飄蜀雨斑竹㸃湘煙暮雨従渠濕春氷敢自堅縞衣迷故國華表竪層巔白紵行人唱銀缸傍舍懸芙蓉羞爛漫蛺蝶舞聨翩繡壤遮王嬙鈎欄鎮阿甄紅顔多蹇劣清涕莫潺湲在世誰非幻鍾情我獨憐微生同坎壈幽思乆婵媛禁闥初通籍儒林早備員詞華翬五鳳幃幄飫三鱣眉目端如畫丰姿美且鬈鑾坡披奏牘馳道鞚飛駩雅譽傾時輩清流冠吏銓賔筵陪有客羽獵賦于畋綺席延枚叟蒲車屈鄭䖍天顔却下顧雲路快髙騫昔似沖霄鶴今如跕水鳶九關嚴虎豹平楚落鷹鸇拜命沾三宥歸耕困一廛壯心徒激烈長袖㡬翩躚倦泛張騫梗虛彎李廣弦古苔封片石荒櫪卧雙騝草茇臨丹壑柴扉枕碧漣奚童開雀網穉子縛魚筌白石潘郎鬂青燈子敬氊哀筝開緑蟻雄劒搏烏犍雨露従枯槁山林且静便朝真探玉訣觀妙解名詮丹鼎團龍虎𤣥龜下澗瀍屋頭杉隠隠庭下竹涓涓薜荔裁秋服楓香當晚饘關元存太乙文火養純乾七夕邀金母三山候偓佺醴泉清似玉𤓰棗大如拳老去渾無賴憂來獨惘然有懐通尺素何計索筳篿孤况憑誰問沖襟待子宣蓮飄知薏苦藕㫁識絲纒慘淡黄姑渚玲瓏織女躔交疎期屢爽謀拙去何遄畫餅文章貴嬰兒造化權寜勞褰短褐端合掩真跧病骨相如在勞心宋玉傳韓憑春寂寂杜宇月娟娟邂逅時將晚淹留景莫延流星光晻靄雄霓動連蜷艶態千秋隔羇腸百慮煎錦蕤空薄幙絳節映重淵洛浦凌波襪西湖罨畵船佳人不可見長誦法華篇琪林夜宿聨句一百韻并序嵗六月余還自鍾山與王河東佐尋真郡城琪林因寓宿東偏之得閒亭亭蓋蕭鍊師之所築去蕊闕三十餘步軒敞清僻逺脱凡境前有茂林嘉卉竹栢之屬野意藹藹是夕夏之望後石尤風節三日㴻雨初止星月明朗河東與余焚香瀹茗共語疇昔因思年十八九時承先人遺澤得弛負擔過從貴游之列一時聞人相與友善若洛陽李長史仲修鬱林黄别駕楚金東平黄通守庸之武夷王徵士希貢維揚黄長史希文古岡蔡廣文養晦番禺趙進士安中及其弟通判澄徵士訥北平蒲架閣子文三山黄進士原善皆斯文表表者也共結詩社南園之曲豪吟劇飲更唱迭和翩然翥鸞鳳鏗爾奏金石而河東與余為同庚情好尤篤歡㑹未㡬殷憂相仍城沿兵火朋従散落河東與余拆袂奔走邈不相見凡十餘年乃幸前左轄寳山何公恢復兹郡開署求士而余二人首被禮接因偕従軍西征談笑油幙方甦離索之氣而倥偬又告别矣兹焉時平嶺筦清奠余二人者乃復遇於此悵然思痛潸然涕零晤然顧懐猶以為此身之尚在夢寐中也於是相與披寫情愫聨為韻語肺腑滂沛莽不知其繁冗人之初生其本無謂庚庚一形之累鼎鼎百年之間忽焉而蛟龍翔倐爾而蚓蠖伏將造物者欲賦人以智慧而勞之耶不然何向來哀樂遷變若是其多也故於終篇遂有御風遺世之意蓋亦昔人所謂無聊之際而托之以自擴者詰旦因書二通其一以遺觀長黄翁其一以寄羅浮蕭鍊師云詞曰紫府黄金榜𤣥關白玉京偶尋方外侣佐因識静中情夕景低崇闕蕡秋光澹列甍宛聞天籟杳佐渾覺世塵清縹緲羣真下蕡森羅萬象呈勾陳聨上界佐析木近前榮竹炫湘川葉蕡荃揚楚畹英旛幢行道影佐環珮步虛聲桂露蟾光濕蕡松濤鶴夢驚古嚢緘緑綺佐隂壁倚蒼精净几從容凭蕡佳篇取次賡奚童髽髮秀佐仙客氅衣輕頓使心期曠蕡従知境界宏堂因衆妙扁佐軒以得閑名宴坐咸嘉㑹蕡興言憶舊盟丰姿初得覩佐懐抱即相傾友誼芝蘭契蕡文聲鐡石錚鄉關雖異縣佐年齒幸同庚才邁誰能匹蕡情親我所兄長遊期楚蜀佐任俠擬幽并雅結南園社蕡狂為北郭行山風紅苾撥佐野日錦繁纓博帶皆時彦蕡髙筵即上卿栁塘時睡鴨佐杏圃暖啼鶯南内霓裳曲蕡梁川雁柱筝風流追謝朓佐俊逸到隂鏗刻燭催長句蕡飛籌促巨觥歡娯隨地有佐意氣札霄峥樂事俄成夢蕡憂端忽謾生秦樓絲管歇佐越嶠鼓鼙鍧培塿封屯蟻蕡滄溟吼怒鯨孤城尋刼火佐萬姓轉饑阬奔走羞徒步蕡艱危學避兵彭衙愁杜甫佐戰國老侯嬴袖貯生毛刺蕡家餘折脚鐺嬌嬰須橡栗佐鄰嫗遺蔓菁舊綉裁新褐蕡寒燈翳短檠苦心灰一寸佐吟鬢雪千莖養志悲華黍蕡傷時賦伐櫻草𤣥供寂寞佐居素保幽貞世態何多易蕡人情凡幾更駑駘先歴塊佐嫫母妬傾城康瓠迷周鼎蕡淫哇亂帝韺含沙叢毒蜮佐觸氣揵飛蝱黙處憂心悄蕡傍觀怒目瞠猛然思奮迅佐鬱爾困拘獰旅邸榮枯枕蕡秋棋黒白枰正懐三月弔佐復有二天帡左相通書速蕡羣僚倒屣迎劇談勞過許佐吾道賴遄亨楚楚紅蓮幙蕡團團翠栁營前茅瞻白羽佐後勁擁𤣥旌尚想従軍樂蕡深慚待士誠價酬千里駿佐食共五侯鯖祖逖心何壯蕡陳琳伎善鳴聞雞三尺動佐倚馬萬言成勲業祇如此蕡行藏莫重評島夷新版籍佐煙雨舊柴扃鳳厯頒洪武蕡鴻圖啓大明包茅輸禹貢佐卉服入周正黄道三台正蕡蒼穹八柱擎文臣登稷契佐武將拜韓彭恢拓神應助蕡提封孰敢争大荒空朔漠佐平楚路攙槍閩土妖氛净蕡鍾陵王氣横隆恩光岳瀆佐至禮慶宗祊貔虎分環衛蕡蛟龍對栱楹河沉漢后璧佐廟列吕公璜交趾來馴象蕡雕題進語鸚堪輿欣有戴佐師旅遂無征邉翰開華省蕡名臣秉重衡逺猷資上士佐深惠洽疲氓自念予生息蕡于今覩治平屠羊安返肆佐買犢事歸耕栗里山無數蕡桃源水一泓墾田先種秫佐結屋便株藑故作深林隔蕡還従曲港縈風蘿猿疊疊佐雲木鳥嚶嚶徑狹交平仲蕡洲迴接杜蘅㫁崖敧削銕佐懸瀑碎飛瓊冉冉松吹粉蕡娟娟筍脱綳草寒愁格磔佐沙霽喜鵁鶄漁網溪童結蕡禾船稚子撑物情俱自得佐吾意豈求贏藥裹從堆案蕡書籖或滿棚繩床低窣兀佐石鼎小彭脝隠具家粗足蕡閒工日計程梯岩探野蜜佐堰水搗香秔紫斸蹲鴟芋蕡紅收薦蟹橙缺籬添補竹佐荒圃賸移檉陶令茅柴酒蕡東坡骨董羮任真形放浪佐坐懶髮鬅鬙更學丹砂訣蕡長離世網嬰御風求抱朴佐縮地候茅盈綺食青精飯蕡黄茅紫石瑛凌虛朝日表佐觀化睨天睛蠢蠢哀羣動蕡飄飄隘八紘瑤池傳鳥信佐緱嶺度鸞笙弱水秋初淺蕡清都夜正晴寄言蕭羽士佐來此共蓬瀛蕡西菴集巻八
