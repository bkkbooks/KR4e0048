body:
  text: 西菴集卷二明孫蕡撰樂府將進酒青瑶案上離鸞琴一徽已直千黄金開樽花下對明月欲彈一曲還沈吟沈吟沈吟㡬低首且彈商聲勸君酒雍門楓樹春蕭蕭地下田文骨應朽紫騮馬紫騮馬黄金羈妾家夫壻金陵兒金陵正值䋣華時日與逰俠相追隨追隨逰俠金陵下長跨金羈紫騮馬賭勝初登蹴踘塲縱酒還来鬭雞社越羅楚練照晴空飛鞚揚鞭去似龍却轉端門回輦路斜穿夾道過行宫行宫夾道通三市長使旁人誇意氣紫陌春融錦繡連青樓日暮簫笙起青樓娼女砑羅裙清歌宛轉駐流雲歌闌陌上春風度舞罷樓前壁月新陌上樓前相識多相陪相引屢經過房櫳寂寞交疏裏雲鬂粧成柰爾何烏夜啼蘢葱忩閉雲凝影織錦梭停蜀絲冷蘭心欲語還自緘待郎不来秋夜永秋烏夜夜啼啞啞鳯書應来郎到家開門自把枇杷花望行人髙樓臨廣路朝日麗綺疏美人盛容飾凝睇倚踟蹰踟蹰長太息愁思鬱煩紆愁思知何為自言惜離居将期嵗暮返忽厯三載餘昔如春園花今若秋水蕖盛年詎可再獨宿誰與娯思逐北風翔相従千里餘中途儻相失浩嘆何所如長相思洞庭清秋灝氣多金盤彩月揺碧波湘靈朱絲奏雲和九疑木落風娑娑長相思渺何極湘山雲㫁湘水深淚竹年年雨花碧飲馬長城窟行長城去迢迢征馬鳴蕭蕭馬飲月窟水長城萬里遥征人行従軍離家今㡬春春花復秋草閨人念逺道逺道歸無期漂流不相知徘徊復展轉展轉長相思相思不相見涕泪鉛華滋風従西北来吹我井上桐寒涼颯将至惻惻傷我衷乗月搗寒衣丁丁砧杵悲衣成欲寄逺君在天一涯瘦馬戀破􅌴倦禽思故巢君行亦已乆孤妾寧自聊逺使来長城帶得音信還書中何所道但道寄平安平安不顧返嵗月忽已晚君心知若何妾意今無限行路難君不見翟公昔時作廷尉蟬聨賔客填門至竝披縫掖曳長裙夕振鳴珂晝停騎峨冠博帶稱徃古吐氣揚眉論當世交態渾如金石堅朋情肯數芝蘭契當時意氣何豪雄炙手可熱嘘生風日晏聨鑣登紫閣平明騎馬出銅龍只道浮華長若此誰云生死不相従一朝官罷成索寞門外庭前可羅雀寂寂蓬居向午開蕭蕭木葉驚秋落古来此道今可悲須知榮悴亦無時花前且盡一壺酒世事悠悠儂不知行路難龍門西接崑崘丘中有一帶黄河流風雷噴薄不可以利涉鬼浪吐雪龍為愁我行欲濟無方舟長吟澤畔成乆留暮天揺落對羇客白石楚楚青楓秋行路難嵗将夕靈槎八月秋風生安得乗之泝空碧白頭吟妾昔深閨裏風情未嘗識獨有如花容嬋娟自憐惜願言嫁得同心人共駕雙飛彩鸞翼君時走馬從東来揚眉吐氣萬人開當時鴻鴈豈無侣妾獨憐君英俊才一夕誤踰垣従君共君語君指松柏枝嵗寒永相許従君衣錦還故鄉蓬屋蕭然但環堵相守在貧賤棲棲還共居自除花靨面起結青羅襦當壚滌器不知恥遲君他日乗髙車一朝意氣題橋柱偶上金門見明主十年詞賦髮成絲縱博黄金只如許才華備供奉富貴能㡬何文園病消渴憔悴亦已多金莖瑞露不得賜起視雲漢空星河不謂羇旅餘向来聘私室舊好如塵埃新情若膠漆清晨起坐白頭吟哀怨凌天薄雲日哀怨復哀怨蛾眉空自顰生來見事晚怨妾不怨君投珠擲璧不自惜晚節末路當何云妾已無復言於君更何道願君與新人歡愛永相保莫貪春日兔絲花亦作秋霜女蘿草妾有青銅鏡蛟螭蟠玉臺自君一為别棄置生浮埃志殊心異不在貌珠簾繡匣寧勞開案上龍唇琴氷絃冷将絶悲来試一彈不覺淚成血因君一曲鳯求凰誤妾凄涼百年月浪盪指明月清光無定時君心亦如此中路豈不移妾心懐氷霜凜凜君詎知君心儻有能回日缺月重圓應可期昭君歎憶初少小入宫時風鬟霧鬢緑萎蕤自言佳色已無匹不謂官家猶未知十二瓊樓動光彩三千彩女妬蛾眉鴛幃不作春宵夢紅葉常題秋日詩畵工不識嫣妍趣卻遣丹青故相悞買工不是吝黄金黄金已盡相如賦早知容貌世稀有臨别夫君猶可顧翻将寂寞倚門悲啼向迢迢去鄉路穹廬雪落似梨花五月天山草未芽鏡玉塵昏孤鳯影臂紅香冷守宫砂長門無復沾恩澤絶域誰知有嵗華不恨邊沙埋絶色還聞漢國選良家人言北狩封姑衍盡日凝粧候金輦憔悴雖縁别恨􅄈娉婷尚勝良家選五雲迢迢山宛宛日近長安一何逺新愛雖濃獨自憐舊恩未㫁誰能遣琵琶一曲苦従軍調苦單于醉不聞霜壓氍毹秋欲半月低絃索夜将分溶溶淚濕龍香撥冉冉愁看鴈塞雲病裏常思霍去病夢中猶詛奉春君湘妃曲沅江木葉下洞庭秋水多湘靈美清夜隠約倚層阿氷雪耀玉容逺山斂翠娥風鬟散香霧美盼溢回波明璫結珠珮鮫綃夾素羅金支色璀璨翠蕤光盪摩小環奏玉簫雙成鼔雲和瑶管雜哀怨清彈間嘯歌妙曲隨風揚餘音泛流霞林端舞鸞鵠水際起蛟鼉問汝何所思慨嘆慕重華軒車去杳邈黄陵起嗟峨汀洲生蘼蕪松栢掛女蘿清涕下灑竹斕斑隠成花日暮天氣肅星移嵗蹉跎靈荃不可見婉孌悲如何九原儻可作千載復来過阿嬌怨妾昔初入昭陽時横雲學得内家眉風鬟霧鬢在君側長恃娉婷不自持侍宴前樓春爛漫承歡别殿夜逶迤西涼絃索龍香撥北苑葡萄金屈卮一従寵薄恩光歇長門永巷喧呼絶斗帳香銷荳蔲埀舞裙寛褪丁香結熏籠夕倚瑣窓雨羅襪秋凌玉堦月凄迷夢醒心似灰零亂憂來涕如雪横塘浦口大堤邊女伴年年憶採蓮雙飛翡翠渾如畵竝蒂芙蓉只似仙傍舍誰唫白華曲下堂長詠緑衣篇君恩若許重相惜缺月清光應再圓班姬怨燕燕復燕燕飛来尾涎涎朝辭烏衣國暮入昭陽殿羽毛一何好似許令儂羨遂令同輦人咫尺不相見新愛易舊歡物情有遷變白日尚移光君恩詎能徧懐今思獨永感昔淚如綫秋草沿玉堦流塵滿紈扇紈扇知妾心攜持自障面時来即所遇勢失貴亦賤庭樹秋風生無勞篋中怨烏孫公主歌咽咽復咽咽羊車鳯輦恩光絶新新復新新駝裘貂帽來相親昔為花月漢宫女今作風沙北地人漢宫北地何分别人生過眼如一瞥彩雲易消月長缺奈可嬋娟涕如雪且喜從今罷戰爭天南天北樂昇平一堆紅粉壠頭塟百萬兒郎邊上生漢宫剰有三千女豈憚邊庭有北部従此龍泉不用磨只従天下選嬌娥銀鞍白馬金槖駝琵琶絃索聲相和葡萄酒緑朱顔酡壻家兒孫日日多年年只報烽火息莫問嬋娟傷綺羅白紵四時詞四首姑蘇臺上春風和江花亂落江水波交疏楊栁緑參差華筵夜列開綺羅當筵西施間羣娥朱顔為君起微酡自拈紅牙節清歌飛花著人思䋣多華月耿耿度斜河疎星出河夜欲過烏啼啞啞柰爾何閶門輦路薫風時江光㶑灔芙蓉披翠羽霓旌照洲渚鑾輿岀逰初避暑西施含顰嬌不語羣娥鬭起歌白紵回風舞袖為君舉歌聲窈窕一何長白紵之白白如霜木𤓰花紅茘子香東江月出西江光銀壺酒多樂未央館娃宫畔風蕭蕭芙蓉隕香楊栁凋銀河影淡烏鵲橋熒熒雙星麗碧霄美人微醉臉紅潮筵前舉袖催玉簫舉歌白紵鬬嬌嬈越羅楚練風飄飄此時奉君情欲絶銅龍夜深宫水咽銀床低轉梧桐月北風吹江日宛宛江天飛雪簾櫳滿美人臺上鬬腰肢羽觴流霞照華琯筵前西施含醉眼歌停緑水聲欲緩羣娥玉環低款款别宿臺前水仙館芙蓉帳髙錦雲暖儂覺寒宵作那短團扇詩團扇復團扇秋風淅淅昭陽殿燕燕飛來尾涎涎同輦君王不相見長信宫深秋夜長玉階坐對明月光玉繩低埀夜未央牽牛織女度河梁自投長袂數愆殃夢魂彷彿若有亡君顔夢見在我旁覺來邈若天一方起援鳴箏發清商舊怨未平新怨長新怨未平復舊怨怨此銜泥梁上燕雙飛雙宿令人羨還來啄人嘴如箭燕燕于飛奈爾何閒愁不為傷綺羅長陵百尺髙嗟峨山精日落悲薜蘿誰能為譜螽斯羽翻作當筵白紵歌梁父吟江水何深深青楓映雲林衡門一杯酒抱膝梁父吟君不見夷吾奮袂投南冠故人薦引登君門揚眉吐論下荆楚糾合冠裳朝至尊又不見樂生徒步従西来燕平一擁帚調笑黄金臺轅門一日見旌節七十齊城生暮埃古来英俊人所遇皆有立袖拂驪龍珠能令鬼神泣而我獨何為幽泉凍蛟蟄荒蘿繞屋秋雨涼山鬼吹燈冷光濕㡬欲乗風朝太清芙蓉縹緲白玉京天田角井散烟霧阿香布鼓琅璫鳴星辰可望不可即手把琅玕空復情為臣自古良獨難我更懐之摧肺肝田彊古冶三猛士昔者虎視青齊間悞罹相國二桃計恨血今為春草斑白頭勲舊且如此何況新知而靦顔梁父吟聲正苦日落未落天星黄西園灌木秋楚楚青青千里草如霧兀兀當塗髙踞虎長陵百尺空嗟峨夜半山精泣風雨世無女媧五色石天柱欲倩誰人補荆州水碧岷峨青思美王孫𣺌何許梁父吟聲苦傷歌闌玉壺缺白髮千丈長起坐擊長劍仰天悲流光西歸白日為誰晚東流之水何泱泱青㝠黄鵠儻埀翅我亦凌風隨爾翔挂劍臺我有白虹青霜之寳劒舞時朶朶蓮花艶去年北上東蒙峰君眼如猫㸔不厭今年匹馬歸江東将期豁我抑鬱磊落之心胸懐君不見淚如水墳樹索索生秋風嵗華零落對杯酒酒酣脱劍為君夀今為君贈君不知墳前掛向桂樹枝等死酬知心所許劍有神靈劍應語金環魚腸寧足數草平翁仲月荒涼山鬼提攜學吾舞銅雀臺阿瞞在時起臺殿宰割山河㡬征戰賦詩横槊氣何雄賣履分香淚如霰良辰吉日人自悲安有繁華非昔時華容嬌舞對松栢歌笑喧喧知為誰有歌有舞還尚好莫怨西風翠蛾老君不見栢梁廢榭無人登烟草凄凄茂陵道楊白花楊白花花離離隨風落萍草蕩漾無還期仙桃醉日氍毹暖茘枝漿凍黄金盌連臂歌殘翠華館愁來玉環低款款春宵長春宵短休洗紅休洗紅洗紅顔色落莫思君思君懐抱惡君恩原不淺妾命由来薄君如白日不回光妾有芳情向誰托休洗紅洗紅生寂寞蔣陵兒蒋陵健兒身手捷青年好遊仍好俠錦衣繡帽綵絲囊緑鬢葱蘢映朱頰春風二月蒋陵西柳暗秦淮花滿堤騕褭金鞍揺日出輕盈紫陌踏花嘶佳人紈扇和詩贈上客金瓶帶酒攜上客留連正及時佳人妙舞鬭腰肢舞回璧月當空見歌罷楊花似雪飛楊花似雪紛紛落酣醉人前誇浪謔自然不分揖金張況肯低頭拜衛霍意氣由来凌七貴豪華豈必資三畧五侯宅裏聽啼鶯廷尉門前彈羅雀揚雄寂寞掩柴扉草得𤣥成鬢若絲嵗嵗年年書閣底惟應羨殺蒋陵兒苦寒行隆冬十二月四野雲氣浮寒日霾夕光層隂肅幽幽苦哉離家人嵗晏尚逺逰北上太行坂詰屈阻且脩西轅指張翼東轍望幽州嚴風裂短袂宻雪凋敝裘熊羆啼路隅鬼火照林陬車轂陷泥滓馬毛凍颼飀涉險終日行薄暮不得休苦顔帶氷屑涕淚沿眶流空山絶人烟野飯依古丘行囊已罄盡何以慰旅愁苦哉離家人坐念生百憂鞠歌行熒熒圃中花濯濯堤上柳春日齊敷榮秋至就衰朽萬物隨變化浮生詎永乆自非彭與聃誰能長夀考君看少壮顔倏忽成老醜及時當黽勉遲暮復何有傷哉行長夜何漫漫愁氣悽已悲浮雲掩明月涼風吹我衣曳履出房帷鳴珮下重堦俯觀霜露集仰視星宿稀倦鳥止復翔百蟲鳴聲哀飛翻念儔侣呻吟知嵗時感兹時物變惻怛傷我懐誰能駐流光息此心所思懊惱曲妾家良人壻執㦸明光裏四時遷顯官寵幸無與比似妾初嫁時容光照鄰里芳榮有衰歇喧赫詎可恃火熱變灰寒懊惱何時已長安篇長安形勝地京華富才雄北開左馮翊南列右扶風漢道方全盛象魏何穹窿逶迤長樂坂壮麗未央宫㳺俠多少年妖女秀華容凌雲飛甲第照日輝簾櫳行樂正及時綺羅繡蘢葱珠葉揺蟬鬢銀鞍被玉騘千花色炫爛萬栁景昭融擊鞠都門外鬭雞馳道東青樓啓夕月瑶箏沸春宫良時逝不留流連㑹有終且極娯心意無為虚光風上京行京華全盛日江南鉅麗時鳯閣凌天翥雕甍向日披堤楊埀宛轉溝水逺逶迤萬國年方泰三陽景載熈少年縱娯逰㳺俠相追隨載酒聨絲絡乗騘鞚玉羈鬭雞初賭錦撃鞠復爭馳百卉照眼眀步障隨風移珎禽哢幽響咬嘎一何悲日暮宴青樓稱觴侑瓊姬開筵列上客急管聞哀絲為樂殊未央但惜白日欹豪雄極志意黄髮以為期採蓮曲江南好採蓮蓮葉何田田魚戲蓮葉下鷗飛蓮葉邊蓮葉蓮花耀洲渚桂楫蘭橈下長浦採蓮採葉忘採花隔水停船共君語君語不還顧妾心将奈何回船向明月月照江水波江水照妾影明月知妾情郎心得似此明月兼照蓮花與蓮葉短歌行擊長劍和短歌短歌聲無歡調促情苦多盼流光疾逝波青銅霜飛奈老何長歌行彈鳴絃發清商悲吹激林木歌聲一何長歌聲長絃聲緩百年鼎鼎不易滿古意二首山樊花落春風起吹妾芳情渡湘水夢中蝴蝶相交飛門前鵲聲郎馬歸梧桐初落金井牀㫁蛩聲裏月如霜沉沉玉漏清秋夜妾顔如花恐愁謝秋風詞三首并序魏文帝作燕歌行盖秋風四時之變而其音韻鏗鏘情思悽愴為千古七言之祖其後如少陵秋風兩首邢君實秋風三疊皆本此而作者也今特衍其詞語分為三首略竊三疊之意雖未能以配詩祖則亦可彷彿四愁之遺響云秋風嫋嫋天意晶寒蟲唧唧霜露零白雲孤飛雁南征念君嵗闌逺逰行長年驅馳竟何成閨閣盼望空熒熒哀來傷秋百感生感極涕淚沾衣纓何人月髙彈鳴箏緐絃急絲攪離情銀河横天湛空明哀猿寥寥共悽清微禽安棲夜不驚夫君胡為未遑寧秋風颯颯林木空吳山楚山千萬重湛湛江水上有楓念君遊行逺從戎不遑寧居走西東寂寞空閨敞房櫳獨宿涕淚沾襟胸悵望不見憂怔忡長雲遥天叫孤鴻哀音嗷嗷思無窮黄姑斜河夜正中牽牛七襄淡横從夫君胡為苦匆匆秋風淅淅庭宇虛日行南陸露如珠江空木落芳嵗徂念君逺逰今何如别離不得尺素書妾乆悲傷惜居諸惻惻涕淚盈衣裾凝思關山倚踟躇南鄰誰家吹笙竽清聲撩人思煩紆䋣星麗天明月孤城頭夜棲白頭烏夫君胡為未寧居南浦曲君家住南浦妾家住横塘少小曽相識況復是同鄉妾年與君相上下月下花前㡬相許相憐相愛君不知卻共何人隔花語芙蕖被霜那得連荷風蕩露那得圓君情君意苦難定妾貌妾心長自憐横塘曲鶯黄不染衣蝶粉不勻面有情翻作無情悲相見渾如不相見落花深處紫騮嘶紅藕香中畵舫移藕絲難疊同心結花影空成連理枝君如宿沙鴻妾似浮波鴈暫時照影相和鳴逐浪隨風各分散分散杳然去㡬時還合并芙蓉易謝月常缺亦似人間離别情春愁曲妾意一何長春光一何短良人逰冶郎去去不知逺含桃石竹花盡紅房櫳蝴蝶醉春風令人翻愛逺離别孤絶相思情更濃春開曲去年百花開春風妾顔窈窕如花紅今年花色仍自好妾顔比花已漸老良人新愛移平生妾貌如花空復情花開無言妾不語妾淚長埀花帶雨㳺絲曲㳺絲映户春風盪雕簷雨浥蜘蛛網春花亦笑綺帳空故遣飛紅入虚幌青樓夫壻醉㤀歸魂夢相尋意轉迷恍似妾心懐舊愛還如君意戀新棲綺疏鸚鵡通人語戱把琵琶擲金羽含情暗卜無心負今夜渠儂到家否㳺絲􅇢花風葉葉呉羅袷薄新寒怯蜂逰亦解鑚綺疏不獨房櫳出蝴蝶懐人不為青春過别有閒愁幽思多君情妾意俱腸㫁舊愛新憐奈爾何落花曲昨日見花開今日見花落花落花開還滿枝人老終無年少時勸君及時且行樂莫管花開與花落木葉曲南風木葉青北風木葉黄木葉有零落客心與爾同悲傷悲傷日日人漸老明年木葉依舊好蓮花曲蓮花復蓮花蓮花相交加葉如雲鬢偏宜緑花比妾容還更佳蓮葉蓮花相對好妾容妾鬢愁中老葵花曲蜀葵花開開復落黄金滿地秋風惡良人逺去不歸家秋風吹落蜀葵花蜀葵花落開復好良人不歸愁欲老鴛鴦篇南浦雙鴛鴦生来不獨宿葉底已雙飛花邊還對浴鴛鴦可羨復可憐況妾容華方少年織婦詞呉中白紵白如霜春風入衣蘭麝香二月城南桑葉緑新蠺初出微於粟採桑日晏攜筐歸夜半懸燈待蠺熟繰成素絲經上機兩日一匹猶苦遲織成裁衣與郎著妾寧辛苦教郎樂家中貧富誰得知郎無衣著他人嗤古鏡詞貧女池邊得銅鏡鄰媪歡呼喜相慶持歸鉛粉三日磨龍影糢糊面猶瑩機中剪素為鏡囊染絲繡作雙鴛鴦横看豎照心不厭借插金釵學士堂廢銅雖舊惜於寳無錢買新舊亦好誰識青樓金鏡開珍珠綴匣瓊為臺漁父詞順流得魚易逆流得魚難難易有天定順流心所安網羅疎疎鈎曲直老翁取魚兼取適樵父詞清晨腰斧出日暮腰斧入青青遍原野造化若不息我願嚴霜殺荆棘蒼松翠栢髙千尺田家歎田家養牛如養龍妻孥望嵗長防冬耕田得暇縛屋茅編竹著泥防北風山田不雨水欲涸田頭水車鳴角角歸來夜半猶未眠新婦懸燈照蠺箔田家作苦無休時夏來糶穀春賣絲無因昨夜到城郭羨殺狂逰輕薄兒耕父詞朝耕山下田暮耕山下田辛苦食筋力持此終嵗年耕田得穀豈不樂但願年豐莫作惡牧牛詞朝出牛亦出暮歸牛亦歸牧牛如種樹貴在不擾之放牛散食山下草草香水甜牛易飽牧羊詞隴羊尾簁簁山虎毛離離願得山虎死隴羊長自肥蒼汒大化良亦苦怪底生羊復生虎射雉詞春雉巢草中子母不相離時時引子嬉翅短還墮池回弓落箭不射之深山大澤從汝飛射虎詞射羊得羊食射虎被虎傷始知學射虎不如學射羊村前村後腰我弩但願逢羊莫逢虎採菱曲朝逰大堤口暮泛横塘邊紅粉照緑水自羨還自憐紅粧照水人見好涉江採菱何可道石榴詞纍埀纍埀復纍埀纍埀壓倒珊瑚枝西風擘破玳瑁皮露出數顆珍珠兒採蓮詞誰家遊冶郎日日在横塘只採蓮葉緑不採蓮花香採蓮採葉猶自可憐新棄舊愁殺我蠶婦詞朝看箔上蠶暮取繭上絲絲成給日食不得身上衣早知阿家蠶事苦不若當初學歌舞貧女嘆寒花難為紅貧女難為容蕭條鏡中影寂寞林下風蛾眉翠黛誰家女日日東鄰教歌舞西菴集巻二
