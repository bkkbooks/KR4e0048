body:
  text: 西菴集卷一明孫蕡撰五言古雜詩六首飄風振長薄夕日淡無輝良人久楚蜀今在沅水西别時春花發秋葉忽已飛無由通精神夢寐長相隨欲寄一尺書臨風久徘徊遊鱗沒水曲征鴈杳雲涯哀猿常對吟凍鳥亦並棲居然獨處廓坐使恩愛違何能一會晤以慰悽惻懷浮萍無根蒂泛泛江海間狂風簸巨浪漂泊何當還亦似離家客長年去鄉關莽莽涉萬里迢迢度千山沈憂損精魂逺道多苦顔無為歌此詞惻愴傷肺肝大堤有遊女盛服佩鳴璫冶容麗皎日錦綺華若英含情采秋緑薄暮不盈筐問女何所思疊疊哀怨長夫君久離索杳邈江與湘寒涼入短褐波浪泛舟航芙蓉謝初夕巖桂亦已芳渺渺燕北歸飛飛鴈南翔風飄流塵起木落天雨霜俯視慚逰魚仰觀愧七襄此情君詎察懷玉空自傷燦燦園中樹灼灼枝上花朝迎雲間日暮逐東逝波秦樓起荒煙鄭谷棲餘霞浮雲等霧露富貴焉足多邊城亘長雲迢迢接沙漠時平宣威逺壯士從軍樂霜風朝出獵錦斾明揮霍營田懸兩狼都護挂雙貉前矛擁宛騎後徑吹羌角官勳四時轉征戰邊塵邈腐儒身計疏中夜思奮躍何能投章甫從爾上麟閣十月良家子從征上邊州明月照鏡匣北風吹馬頭少年有竒志思欲分國憂誰能學李廣百戰不封侯南園詩社良宴集南園清夜遊條風振絡組華月照鳴騶髙軒敞茂樹飛甍落逺洲移筵對白水列燭散林鳩雅興殊未央旨酒詠思柔玉華星光燦錦綵雲氣浮麗景不可虛衆賔起相酬長吟間劇飲楚舞雜齊謳陵陽杳仙駕韓衆非我儔聊為徇時序娛樂忘百憂南園夏日飲酬王趙二公子澄佐郡城多暇日公子專幽尋招攜無俗士歡宴盡華簮臨水釣逰魚凌風弋髙禽南園當盛夏灝氣滌煩襟澍雨朝浥道流雲豁輕隂芙蕖被曲渚灌木秀髙林展席羅長筵美酒對坐斟交交黃鳥弄聒聒玄蜩吟嵗時遞遷斡賢聖皆銷沈於時不痛飲負此芳賞心溪山小隱日出景更好流青入忩户木落葉上霜泉添夜來雨䇿驢過石橋傍舟向沙渚遇此休禎期何須羡簮組道上作髙林翳當道莽莽秋向深回風亂落木驕陽亦化霖我行泥塗中凄厲入我襟白日晦平陸玄雲生夕隂歸鳥靜不飛暝猿長哀吟感此時景邁況將陽月臨不怨行路難所嗟嵗駸尋悲鳴激楚奏思苦調南音鍾儀久已死誰復知此心期羅浮蕭鍊師不至石室松桂秋涼風滌殘暑柴門敞空谷曠夕懷仙侣吹笙久不至鶴馭今何許朗月流清輝山中幾延佇寄琪琳黃道士雨絶天景佳前榮樹光緑遙憐採芝侣逺在春山曲琴歌久已斷酒賦何由續有約今夕同開樽掃茆屋崖山有感崖山峙海門乃宋沈國所雙龍如九淵義士沒遙浦妻子驅先淪焚香亦何補我來弔忠魂但見浪花舞底用璽發光凄其為懷古安期升仙臺神仙莫可稽欲弔蹤多漫惟有安期生遺臺粵山畔想當避秦亂南還事冶鍛砂採芙蓉靈火煬電光爛丹成遂輕舉跨鶴陟雲漢尚留如鳬舄世上作竒玩飛騰今何之翹首起吁嘆夏日過蒲澗寺後二巖觀菖蒲炎威鬱難攄況值日方永揮箑偕同袍逺詣山中靜消暑得清泉流來自巖頂循澗見石蒲瀰布水光映蝟毛刺針鋩虎鬚簇錐穎婆娑濃靛敷翠色香挺挺傳是古堯韭一覽心已領採餌可明目爍爍電光耿尤堪引夀齡久視閲遐景遂躡安期蹤雲路恣馳騁旋歸乘天風浩然塵夢醒寄琪琳黃道士墨竹漾漾大湖水娟娟文玉叢龍光起夕霧鳯羽生秋風氷輪出寒峭瘦影篩玲瓏因之懷所思邈在蓬萊宫寄關大舉隱士秋陽化為霖流潦漲平陸隂霾晦萬象嵗暮時運速居者窘營為行者困馳逐晨興起慨歎旅懷傷局促飇風振叢薄泥塗沒車軸庭樹無全柯原草變餘緑靜念窮居士杳然蒼山麓短褐才掩脛糗糒常不足從事屢失會養髙動違俗空櫝隋侯珠誰明卞氏玉貧賤少知已隱淪愧親族勵節希世賢君子善自朂西郊秋日斗柄揭西晨杪秋天氣肅零落沾野草驚飇振林木西疇農務成勤忙事刈穫嵗時樂豐稔膏澤遍穜稑思昔逰京洛寒至未成服敝裘感季子知貧仰鮑叔哀樂如流電撫已心已足無煩抱龜䇿更就詹尹卜南園懷李仲修幽獨攄雅懷逍遙步南園繁卉耀陽德嘉禾秀春暄時暘燠土膏流澌漲逺川荃蘭揚朱英山樊炫文軒埀楊列曲渚鳴鳥何關關展席芳醑陳開觴羣物妍顧瞻失儔侣髙情寄所宣馳思望逺人乃在伊洛壖賢勞事會計日昃不遑安聊復縱長吟引領希令言何能此會合宴樂舒我顔贈從弟三首鴻鵠在陂澤立志恆不羣獨鶴唳九臯音響常逺聞令器逢盛時豈將久湮淪無為秉孤節甘與巢許鄰青陽播林麓百卉生光妍如何空谷資尚爾霜霰纒守節抱苦貞豈不幽且寒由來松柏性羞學桃李顔荆山有良玉韞此璞石中玉人雕琢之始能成圭琮良玉豈非寶亦在雕琢功願言保令譽黽勉光吾宗贈留隱士中美商飇落庭木芳嵗倏已周感此流序易惻惻但懷愁念我同志友不得偕宴逰一居玉堂署一在炎海陬王道今清平有才贊鴻猷誰令抱孤志坐戀林與丘北上京華文物盛東南紫氣浮祥雲開甲第春陽藹道周觀國方振纓彈冠始鳴騶臯夔預接武多士為我儔如何舍此去北上賦逺逰揚帆渡淮水驅馬入青州青州非故鄉鬱鬱久難留西望太行巔南臨清濟流行行日已逺役役安得休微官宦況薄旅邸芳嵗遒嚴風被草木密雪沾衣裘迢遙百越地杳邈炎海陬那能計歸日苦道阻且修别弟離離原上草嵗晚霜霰滋與子為兄弟生世逢亂離飄蕩各分散生死安得知樂土歎無食南州嘆無衣良時幸休明天路開清夷翩翩兩鴻鵠振翼思奮飛一留故山樹一望雲中涯東西各異勢顧影相徘徊逺道去茫茫會合未有期吞聲念同氣淚落不敢揮他鄉儻言歸庶慰遙相思别鄰諺云骨肉逺不若鄰里親往來旦夕念眷意一何勤願言永相保不謂逺離分攜壺與挈榼送我衢路津含愁向往軸酌酒當霜晨戀戀疏者厚依依故情新去去歸未期留家猶食貧有無通假借此道古所敦無為忘寄托别語多苦辛别友喔喔晨雞唱蕭蕭征鴈鳴行裝戒往僕逰子趣修程嚴風裂敝裘霜氣集冠纓亦知嵗聿暮奔走詎遑寧盻盻依衢路煢煢别友生鶺鴒傍我飛楓樹送我行商歌慘無歡飲酒催盡觥車輪倏已逺賔客如晨星離别固可惜志在身與名相期各黽勉天路方清平别內秋霜凋女蘿夕露沾兔絲依依兩夫婦貧賤生别離思昔結縭日適際離亂時布衣才掩脛糟粳不充飢性拙命復窮偃蹇世所嗤賴子同甘苦孤貞常自持幸逢世道平天路振羽儀歡愛未云竟殷勤方自兹執袂詎忍分清涕流裳衣淹留日月促去去無歸期晨雞咿喔鳴行李戒路岐僕從已嚴駕寧能更遲遲所嗟長辛苦不為兒女悲遺語望鄰曲含酸望親知惻惻重惻惻此懷當告誰代友贈别金蘭結深契厚愛兄弟親歡娛暫相違一日勝九春如何捨我去去逐衢路塵行役冒雪霰驅馳極宵晨寒雀思集樹凍池念潛鱗物微尚有托君作嵗晚人嵗晚風已寒蕭蕭吹車輪征袍敝不補野飯新亦陳别曲亂無腔别酒醉失巡私情豈遽忍欲止知何因落日如銅鉦逺山生紫雲君去意惻惻我留涕紛紛王度今清夷世途無荆榛前期慎努力莫用懷苦辛代內贈别惻惻重惻惻君為逺行客逺行無時還千山復萬山不怨别離苦所嗟道路難鴻鴈集沙渚鳥雀棲山樊遑遑欲何之竟嵗不得安昔為風中柳今若霜後蘭雪霰被平野風沙侵苦顔苦顔日以凋去路日以遙妾今守空閨嵗暮不自聊寒花無妍姿凍柳無秀條凄其舊容色坐為憂患銷臨期一樽酒聊以永今朝前途善珍重努力登雲霄寄王給事佐休沐展幽眺步出鍾阜阿卉木春氣盎淮水揚素波泛泛波上鷗遊泳鮮羽儀端坐愧此鳥長逰成蹉跎安得理歸楫翩然解珮珂揚舲過關右鼓枻入江沱友于事宴集物候方陽和酌酒南園上與君同笑歌寄鄭進士毅德宏步出城東門豁我幽素懷茂樹交緑柯鍾陵敞雲崖有鳥鳴春樹顧聲何喈喈靜言感物理心思寡所諧生念同門友襟期曠以乖亨衢未接武丘樊尚髙棲王度今清夷縉紳若雲來鳴珂登鳯闕曳履上鸞臺誰憐抱孤貞甘分棄草萊朝吟小山篇暮詠猛虎詞會酬盍簮願天意諒不違車駕遊天界寺應制車書渾文軌海嶽獻嘉祥皇風載清穆王度日隆昌開嵗時豐慶九域會冠裳璇文星再紀五色日重光順令下宸逰招搖隨西行靈雨浥馳道條風清太常萬騎羅長雲千官沸鳴璫翠華旋地軸黃道闢天閶紺殿開祗林金蓮燦上方百靈儼扈蹕龍象肅周行于時春始和淑氣播青陽卿雲籠羽蓋瑞旭炫虹梁多士溢詞林侍從參翺翔玉音聞謦咳御翰灑琳琅賡歌詳舜訓文思粲堯章天顔穆以愈清宴樂未央願言敷聖澤仁風被八荒朝回呈諸閣老承恩入翰苑竊祿侍彤幃日月行黃道璣衡耀紫微菲才忝下列丹衷無由披凌晨陪稷契日晏揖臯夔海嶽方奠安神人亦恬熙斂蓋瞻鸞馭鳴珂集鳯池遙望雙闕門飛觚切雲霓交疏羅結綺疏柳囀文鸝輕裾隨風旋緑樹晝景移明良感嘉會文物應昌期濯濯聨華采翩翩秀羽儀宣情寄芳藻聊用頌清夷贄翰林宋先生諸老依依野田雀本在桑榆間深林蔭棲息卑枝覆羽翰春風照九垓陽和德澤寬翺翔霄漢上乃得隨鴛鸞羣公圭璧才盛世仕明君出入金門裏百辟同繽紛顯宦極崇髙下顧念斯文惠然枉禮遇揣已愧明恩際會信有時感激復何言斐文謝嘉誨久敬道彌敦輸役蕭牆係組赴烏臺解珮辭禁垣弛刑許輸役獲譴尚承恩局蹐感明宥引咎復何言平明操板築日沒就徽纒寒氣襲敝裘重負赬我肩撫已諒無愧服勤思蓋愆息杵入屏城仰瞻東華門祥風拂左纛卿雲護彤軒翬鳯麗羽翰飛稜髙中天重關起象魏光彩一何鮮百辟羅周行鳴珂翕鏘然臯夔儼穆肅董賈來翩翩白日光昭融下照寧有偏微命嗟薄劣獨兹阻周旋治縣事作訟庭敞公館牒訴日紛紜退食常少暇吏牘苦長勤刻木對胥曺皇華勞逺賔清晨起坐署日入未解紳出沐事宴逰聊用散我神雲還幽谷曙鳥鳴芳樹春信美非久居欲留嗟無因逝言謝簮紱埀綸越水濵送王給事南還良時幸一遘嘉運難再逢流序若飛電倏忽嵗云終羡子瑚璉器林麓隱髙蹤適此徵俊彥奮起惠家邦觀光充上賔恩禮赫以隆金門拜給事百辟肅敬恭回翔忽斂翼言歸滄海東昔若雲中鳯今若南飛鴻出處各有道顯晦詎能同微官慚茍祿仰首慕清風文成德亦著節立道斯崇願言秉夙志永保貞素躬還山行禽魚不可友出就斯人居迂才忤盛世復此歸敝廬投迹近逸民振衣辭髙衢白雲繞我屋清澗循我除深林挽雲軒松竹鬱森疏貧家何所有但有琴與書日暮無人來濁酒聊自娛神全慮斯淡妙得景亦俱豈不樂守貞幽抱恆未舒屯膏違聖訓獨善曠仁譽徘徊望嵩衡惻惻懷居諸擬古行行重行行岐路一樽酒送君當逺行交持未及竟絲管激哀聲冉冉嵗華暮悠悠雲氣征馳車戒往路惻惻傷我情我情默已傷歡愛不可忘昔為春花姸今為秋草芳秋草芳有時夫君見無期獨宿坐長夜淚落如綆縻白日儻回照孤懷君所知青青河畔草青陽煦林薄春氣匝道周婉孌都人子采桑南陌頭修眉婉清揚玉顔和且柔明粧照碧落五馬為久留久留諒奚為妾非貴者儔貧守逢蘧篨獻食獨安羞青青原上柏置酒髙堂上賔友列長筵綺食羅雕盤烹鱉膾熊蹯回風吹繡縠悲管間清彈遺響妙入雲慷慨有餘歡流光若逝水安得長駐顔薄酒聊斟酌幽襟良可歎今日良宴會南園有佳人窈窕桃李顔容華一何麗顧盼生光妍進退禮自防秉德幽且間良媒候嘉意君子希令言鴻鴈念儔侣雎鳩鳴河間盛年若流水隱處獨長嘆西北有髙樓華月散髙樹列曜何參差流光射結綺思婦慘中闈良人涉逺道感嘆夜何其清聲發妙曲宛轉有餘哀妙曲固可聽餘哀知為誰春至桃李妍嵗暮華色衰居然獨處廓顧影久徘徊涉江采芙蓉故人隔千里寄我青琅玕琅玕色美好愛重若丘山感兹纒綿意將以遺所歡路遙不能致欲插排風翰明月皎夜光離離谷中樹燦燦春華芳枝葉何盛茂忽然隨風揚流光有凋換物理安可常擾擾路旁子哀歌使我傷杪秋天氣肅白露結嚴霜攬衣不能寐起視夜何長明月出東壁衆星羅縱橫嵗暮鶗鴂鳴百草青自黃逺道者誰子驅車登太行太行鬱嵯峨天路無津梁興言念同志涕下沾我裳冉冉孤生竹青樓何髙髙綺疏臨道旁美人娛永夜皓齒發清倡玉顔羞掩媚妙曲婉成章含宫亦泛羽忽復轉徵商行雲駐逺漢飛塵連虹梁識曲世所稀遺音空飄揚歌竟夜闃寂悠悠哀思長庭中有竒樹洞庭木葉下悲吹激微寒美人倚修竹凝睇九疑山層雲沒逺巘軒車絶來還既懷文玉佩復采澧水蘭結言欲有贈天路逺險艱沈憂坐將老嵗月銷令顔迢迢牽牛星北風吹雪霰同雲四埀隂惠而能好我寄我瑶華音蟋蟀入床下晨風飛北林川梁限楚越思子闃傷心回車駕言邁壯士悲白日達人愛景光景光無停留鬢髮忽已蒼嚴霜被野草行旅思故鄉禽鳥有所識百蟲知潛藏如何不黽勉老至空自傷東城髙且長咸陽九原上昔日冠蓋場秋風動禾黍曠野浩茫茫大化無停留榮耀安可常煙雲迷五柞榛棘沒長楊時運理則然來者徒自傷所以放志意酣歌稱我觴鳴筝縱繁響緩此幽思長回車長樂坂將去復倣徨願為雲中鴈寥廓恣髙翔驅車上東門良辰集賔友載酒登北邙百草何離離髙墳被山岡四野生悲風夕日寒無光狐狸穴空壙稚子覔亡羊人生寄一世奄逝若朝霜髙堂與大宅終作荆棘場蓬萊隔弱水仙説成荒唐及時且行樂勿用徒悲傷去者日以疏白日無流光逝水無回波浮生類轉燭運盡歸山阿松柏夾長路髙墳起嗟峨古來皆若此咄咄將奈何誰絃雍門琴和此薤露歌生年不滿百日月遞朔望推遷無時停鼎鼎百年內所為竟何成賢者解斯理達生外其形良辰有美酒日對賔友傾迢遙閬風丘竒樹秀瑶英周王八駿沒天路杳冥冥凜凜嵗云暮江潭十月交霜露萃郊原卉木無留榮百草日夜乾鴻鴈鳴洲渚猿狖悲空山閨人念逺道撫節涕氿瀾川梁一暌隔魂夢夜不安厚愛君詎知新恩忘前歡忠誠不見白剖心良獨難望望千里道無由生羽翰孟冬寒氣至愁人起視夜北斗低復昂中垣耀室壁良月知載陽客行涉逺道葛屨履嚴霜願欲同辛苦江漢愁且長臨風付書札鴻鴈無來翔悄悄閨闈心嵗暮惟獨傷客從逺方來妾有錦繡段文采裁為衾上羅連理枝下織雙飛禽惜此嫁時物珍之比南金良人隔山海嵗月亦已深願因飛鴻翼寄以表此心明月何皎皎歡愛夏日短憂愁春夜長房帷敞虛白對此華月光薄雲淒以至入我羅衣裳悁悁感心目欲寐還不遑良人逺行役三載滯遐方别時木葉落今已花卉芳無由達衷曲悵望隔河梁西菴集卷一
