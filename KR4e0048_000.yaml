body:
  text: 西菴集别集類五明提要臣等謹案西菴集九巻明孫蕡撰蕡字仲衍廣東順徳人洪武三年舉於鄉旋登進士授工部織染局使遷虹縣主簿召入為翰林院典籍出為平原主簿坐累逮繫旋釋之起為蘇州經歴復坐累戍遼東既而以嘗為藍玉題畵坐玉黨論死是編前有黄佐葉春及所撰蕡小傳稱蕡著述甚富自茲集外尚有通鑑前編綱目孝經集善理學訓䝉和陶詩集古律詩其孝經集善則宋濓為之序蕡殁諸書散佚其詩文今行世者為其門人黎貞所編然佐稱西菴集八巻而是編詩八巻文一巻巻端題姑蘇葉初春選或初春另加釐訂歟蕡當元季綺靡之餘其詩獨卓然有古格雖神骨雋異不及髙啟而要非林鴻諸人所及小説載書生見蘇軾侍姬朝雲之魂有集句七言律詩十首七言絶句十五首今乃在此集第八巻末葢蕡㳺戲之筆即黄佐傳中所稱集古律詩一巻者是也黎貞乃綴於集末又併其序載之遂似蕡真有遇鬼事者殆與林鴻集末附載張紅橋詩同一無識矣乾隆四十四年正月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:878c47590b8641fd5b45438006b63033c427d2c71ae1d9a6431c9f94a8402517
