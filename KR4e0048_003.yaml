body:
  text: 西菴集卷三明孫蕡撰歌行南園歌贈王給事彥舉昔在越江曲南園抗風軒羣英結詩社盡是琪琳仙南園二月千花明當門緑栁啼春鶯羣英組絡照江水與余共結滄洲盟滄洲之盟誰最雄王郎獨有謫仙風狂歌放浪玉壺缺劇飲淋漓宫錦紅青山日落情未已王郎拂袖花前起歡呼小玉彈鳴箏醉倚庭梧按宫徵哀絃泠泠樂未終忽有華月出天東裁詩復作夜逰曲銀燭飛光白似虹當時意氣凌寰宇湖海詩聲萬人許酒徒散落黃金空獨卧茅簷夜深雨分飛幾載逺離羣歸來城市還相親閒來重訪舊逰處蒼烟萬頃波粼粼波粼粼兮日將夕西風一葉凌虛舟猶可題詩寄青壁廣州歌嶺南富庶天下聞四時風氣長如春長城百雉白雲裏城下一帶春江水少年行樂隨處佳城南南畔更䋣華朱樓十里映楊栁簾櫳上下開户牖閩姬越女顔如花蠻歌野曲聲咿啞岢峨大舶映雲日賈客千家萬家室春風列屋艷神仙夜月滿江聞管絃良辰吉日天氣好翡翠明珠照烟島亂鳴鼉鼓競龍舟爭覩金叉鬬百草逰冶留連望所歸千門燈火爛相輝逰人過處錦成陳公子醉時花滿堤扶留葉青蜆灰白盤飣檳榔邀上客丹荔枇杷火齊山素馨茉莉天香國别來風物不堪論寥落秋花對酒樽回首舊逰歌舞地西風斜日淡黃昏草書歌贈顔景明隱鍾王去我忽千嵗字體變怪少復真蟲文鳥跡久不見塵姿俗態空紛紛邇來繼者誰獨步前有秃張後醉素詞林祕府頃見之令我嘖嘖生逺慕君家此本猶清妍神竒老筆真可傳頽牆敗壁霹靂死枯檜古柏蛟龍纒秋蛇春蚓未易得見爾為爾重嗟惜寶之不翅圭與璧煩君收取謹護藏莫遣風雷化真迹羅浮歌寄洛陽李長史仲修亭亭西樵峰宛在南海湄日華麗仙掌影漾金銀池我昔扁舟恣長往凌風浩蕩烟霞想尋幽更欲探神竒復向羅浮事仙賞仙家三十六洞天羅浮敻與滄洲連丹霞射影四山靜羣真環珮來翩翩蘂珠之峰數千丈君時與我緣蘿上水簾直下飛晴虹萬壑天風度流響山中劉郎司玉臺仙書授我琅函開心如明月炯虛照身與浮雲同去來此時㑹合那能再塵土分飛忽三載我行奏賦登金門君亦乘軺渡淮海淮海迢迢烟樹深相思嵗晚結愁心長風萬里碧雲逺何由一寄還山吟山中洞房春寂寂山中之人長嘆息松花酒熟人不歸瑶草春風幾回碧智空和尚種松歌老僧種松如種柳封植不知年嵗久寒梢未解蟠穹蒼已見鬱律蛟龍走焚香展席坐松隂白石清泉清道心虛無自有神鬼㑹風雨不妨猿鶴吟老僧與松有深契浮華净盡存實際嵗寒不受氷霜欺靜隱山中閲人世亭亭只作如是觀松年僧臘俱髙寒夜深滕六雪中立日落山精林際看老僧愛松如骨肉不比枯梅與瘦竹君不見人間艷陽枝春盡飛花滿岩谷題皇甫文逺所藏左司郎中堵炳山水歌䋣華亂翠時共喜金膏空青人罕識每觀皇甫先生圖令我感此三歎息墨樵避俗如避梟折花頻見先生招亂雲團成樹宛宛淡墨掃作山迢迢人言此是雲谷底武夷下映九曲水不然五老匡廬峰萬疊芙蓉照彭蠡低低茅屋溪澗濵墨樵更寫先生真千章古木一藜杖毛骨自是仙中人塵緣淨盡丹砂熟蒼虬停飛虎亦伏山童卷取琅函經縱有黃庭不須讀烟霞此樂真不迂臨風却作長嗟吁十年未得還初服蕙帳石室今何如先生歸來早卜築我亦同棲此山曲便煩作賦邀墨樵更與泉南數竿竹南京行南京自古說豪雄逺勝秦中與洛中吳越千山髙拱北巴江一道逺朝東秦淮水入丹陽郭北固城連六代宫岌嶪石頭如踞虎逶迤鍾嶽似盤龍龍樓鳯閣天中起萬户千門霄漢裏太乙勾陳紫極通翔鸞舞鶴珠峰峙郤日觚稜駕寥廓行空復道侵箕尾仙掌銅盤玉作漿靈芝華蓋霞為綺華蓋靈芝粲綺霞御橋金水正當衙五門彩旭朝天仗馳道香風散日華細栁千章爭拂地嬌鶯百囀競啼花紫電龍光飛武庫雕甍甲第列侯家侯家卿相真才彥玉笋蟬聨奉天殿屈宋摛文入石渠韓黥耀武專方面黃閣承恩宣雨露烏臺執法行霜霰環珮聲清散早朝葡萄酒緑沾春宴春宴春風坐百花歸來里巷鬭香車金張富貴人爭羡王謝風流世共誇隱約商笳隨赤羽葳蕤大纛映彤牙盤他寶校光前導組絡鳴鑣隘狹斜狹斜西下通三市紫霧紅塵拂天起南陌東廂馬似龍烏衣朱雀人如蟻爭看買珠輕薄兒亦訝探丸遊俠子猶懷鳯臺醉李白無復新亭泣周顗井傍美人悲麗華道上行人談結綺結綺臨春總可憐龍河一帶但寒烟天界叢林開象魏冶亭髙閣艷神仙神仙盡是蓬瀛侣更畫秦臺玉簫女渺渺青鸞月下來飄飄彩鳯雲中舉别有青樓大道旁烟花萬樹儼成行飛瓊裊裊翠羅袖小玉娥娥紅粉粧小玉飛瓊兩少年清歌妙舞鬭嫣妍舞態盤回芳樹底歌喉宛轉落花前彩雲作雨朝朝合璧月流光夜夜圓朝朝暮暮長如此秋月春花若流水去嵗今年景不殊南來北去人相似生緑羅屏遮上客流蘇帳暖邀公子爛漫三春錦繡城空濛一片笙歌市䋣華佳麗樂無邊我獨胡為困一廛已似揚雄棲白屋還如司馬卧文園誰將積業三千牘換取揚州十萬纒桃李風前歌扇底看花騎馬過年年虹縣行虹亭村落如秋花十里五里方一家山城縣治開草屋草屋低窄旋桑麻丁男當官應徭役婦女看家種山麥汴溝淤塞無稻苗麥足家家黍為食野桑養蠶收繭絲棗根染絲來作衣秋湖水落蓮芡盛臘月雪深鶉兔肥嵗時澆酒五月暮但願開雲雨如注蠶成麥熟官事閒栁堤人唱桑隂樹平原行古原縣郭如荒村家家草屋荆條門自罹喪亂新復業千家今有一家存稚子採薪割蒿草婦女攜筐拾梨棗丁男應役不在家長駕牛車走東道黃河水涸無魚蝦居人七月方食瓜人烟星散不成集棠梨苦葉烹為茶凌州九月官稅促黍子在田猶未熟春霜夏旱蠶事空不賣新絲賣黃犢銀河七夕如水流明年麥好君莫愁平原田家行零星矮屋茆數把散住榆林栁林下磊牆遮雪防驟風婦女頽垣拾磚瓦黃牛買得新墾田土㦸犂淺牛欲眠古河無水掛龍骨自縈蒲繩探苦泉山蠶食葉黃繭老野火燒桑桑樹倒四畔靈雞喔喔啼九月霜風落紅棗春絲夏絹輸稅錢木綿紡布寒暑穿夜舂黃米為新酒學唱清商作管絃平田旱多麥少熟杏盡梨枯惟食粟衣粗食惡莫用悲猶勝北軍離亂時驪山老妓行補唐天寶遺事戲效白樂天作秋風楊柳凋金縷冷露芙蓉落芳渚寒香晚色何所如驪山唐姬教坊女蛾眉淡掃山逺碧蟬鬢半拋雲亂吐時粧無復新妖嬈曩態猶存舊嬌嫵我昨咸陽縱冶逰冶逰爛漫遍西州青山直抵雙龍闕緑水橫過五鳯樓南國佳人金錯落長安公子玉驊騮銀壺送酒青絲絡皓齒當筵白雪謳琵琶橫笛空聒耳唐姬搊筝妙無比清彈一曲久含羞呼喚百回才强起移柱相參鴈成列調絃未就人先喜俯首斜拖珠步搖向人髙露春纎指樓髙韻發響泠泠急管悲歌一霎停初聽乍如風雨至再彈還作鳯凰鳴清如玉女鈞天奏壯似雕戈出塞聲澗水帶氷時哽咽春雷震石忽慿陵慿陵未已旋清悄清悄漸凝聲漸小四座無言俱寂寥餘音已斷猶縈繞溶溶宛宛復悠悠切切凄凄還窈窈深閨斷蚓怨寒宵淺谷嬌鶯破春曉纒綿萬恨與千愁婉意柔情不肯休蔡琰胡笳悲紫塞班姬團扇掩清秋樓前皓月明如練天外行雲凝不流促拍未終南內曲新腔忽過小梁州梁州一摺月向午唐姬此時心獨苦銀甲悲深不忍彈衷腸斷盡無由語低籠翠袖揾香泪翻使歡娛變凄楚訴盡平生富與貴可憐人世今成古憶昔開元正太平兒家生長在天京十三學舞曽驚座十四搊箏能擅名玉貌羞花長窈窕宫腰怯柳更輕盈春寒不離鴛鴦枕日晏方開孔雀屏五陵年少秦川客爭愛兒家好顔色殢雨尤雲最惱人追歡買笑寧論直聲名每出流輩上風致獨覺旁人惜承恩況得登掖庭宛轉隨龍侍君側海晏河清久息兵四夷賔貢盡充庭炎方已見來丹荔交趾還聞進雪鸚耀日香車連紫陌飛雲畫棟列朱甍空濛一片笙歌海浩蕩三春錦繡城驪山山上多樓閣萬户千門通碧落大駕深居在九重四時多暇惟行樂已營連昌勝結綺復起芳鳯齊花萼壺飛玉女遞更籌舟戲金龍動鱗角侍臣傳敕選嬌容特許兒家步輦從宫扇影移花雨外山呼聲沸錦雲中千株火樹爭明月萬炬金蓮鬭彩虹子夜歌詞翻白雪霓裳舞隊散旋風歌停舞歇徘徊久銀箏獨進纎纎手明眸麗質一當前含顰美人俱在後數聲清響動絃索八面涼風生户牖艷曲新裁萼緑華中官催賜葡萄酒年年秋月復春花多在宫中少在家嬌笑不愁宫監怒艷粧長得阿姨誇朝遊復道瞻天表夜步西廂拜月牙鬬草經春陪虢國藏􅍐竟夕伴昭華韶光忽逐流年轉野鹿銜花上林苑鐵騎東來鳯闕空金根西狩蛾眉逺上方無復聽宣召新籍寧辭避差遣約臂金環雨雪寬凌波錦襪風塵蹇星移物換得無情復向驪山悄地行紫禁無人芳草合瑶階雨過緑苔生歌臺索寞花千樹舞榭蒼涼月半櫺繡閣秋隂連瑣闥銅仙清淚落金莖髙梧隕翠蓮飄玉太乙勾陳看不足百子樓寒霧影昏長生殿古烟光緑宫牆瓦落見蒿萊輦路塵生走麋鹿舞馬雕床惱夢思花奴羯鼓驚心目故宅新人作宴逰內家紅錦列纒頭珠簾繡柱俄成夢鳯管龍笙總是愁舊曲聞來眉自斂盛年說著口應羞飛蓬短鬢難禁白老屋疏茅不奈秋舞衫長借鄰人著同伴相呼只推却臉玉香隨翠靨消淚珠暗逐燈花落憂來倒插黃金鳯夢裏時彈白翎雀百感中來不自由芳心一片從誰托唐姬言語一何長句句凄其字字傷滿座聞之聲唧唧沾巾我亦為浪浪滄桑轉瞬誰能識富貴浮雲安可常覽鏡每聞悲素髮舉杯長欲勸流光唐姬莫道懷抱惡自古佳人多命薄傾城西子逐鴟夷絶代明妃嫁沙漠樽前有酒且歡笑身外閒愁付冥漠皎月秋來幾度圓穠花春盡從渠落唐姬攬涕復陳情請作驪山老妓行桃李風前霜月下長吟亦足慰平生不因水上琵琶語那識江州司馬名為爾臨風歌一曲百年哀怨起秦筝余既作此詩本戲筆吟弄以為歡笑耳而客有問余者曰子詩淺易明白倣佛樂天然用事不免多誤上林苑是漢家事白翎雀是世曲子百子花萼樓恐不在驪山上如何余笑曰那知許事且啖蛤蜊西山朝來頗有爽氣髙昌老翁行髙昌老翁背隆然黃鬚髙鼻毛髮拳自言少小家幽燕生長適值䋣華年出身從戎事西邊十七八九南營田雕戈如雲護中堅流蘇帳暖埀蜿蜒三珠虎符誰喜懸偏禆盡戴黃金蟬軍中無事惟遊畋錦袍白馬青連錢飢鷹一掣沖九天鴐鵝灑血來連連夜闌愛月醉不眠衆賔呼盧各爭先輸籌唱飲開錦筵美人照座紅娟娟涼州葡萄斗十千金盤丹荔明珠圓野駝之酥香不膻爭持寶刀誇割鮮忽爾不樂心悁悁琵琶催張鳯凰絃纎歌一曲清聲傳華嚴天魔間采蓮美人起舞鬭嫣妍腰肢宛轉飛花旋玉叉斜橫翠袖偏春風徐來拂筵前此時意氣如熊虎伯仲聨翩享圭組青雲頭上髙楚楚却笑旁人不好武一朝零落來南土白髮蕭蕭守環堵北風怒號朔雪舞羊裘無溫敝不補人間俯仰成今古老翁無乃獨愁苦霸陵將軍舊征虜青門秦侯亦開府浮榮飄風何足數碌碌行寄保昌縣丞童豫碌碌復碌碌驅馳半世為斗粟去年臘盡江左邉今春又駕江南船家貧每畏别離苦不知攜纍還顛連炎雲四月關門道青泥滑滑雜流潦黃梅雨裏鈎輈啼瘦妻前僵子後倒君時相見能相憐自出床頭官俸錢東家蹇驢覔借我使我枯槁回春妍貧賤結交常草草多難逢君識君好不得與君長周旋關門長望令人老湖州樂湖州溪水穿城郭傍水人家起樓閣春風埀栁緑軒忩細雨飛花濕簾幕四月五月南風來當門處處芰荷開吳姬畫舫小於斛蕩槳出城沿月回菰蒲浪深迷白紵有時隔花聞笑語鯉魚風起燕飛斜菱歌聲入鴛鴦渚雲南樂成都賈客向人語黎州多風雜多雨雪山萬古長不消山下四時風氣暑竹林西畔是雲南不論冬夏披氊衫蠻官見客花布襖村婦背鹽青竹籃繩橋跨澗石嶻嶪部落馬蹄皆灌鐡引繩貫索通客行插木入崖防棧絶郫筒酒熟蠻人歌太平今喜無兵戈懸車不戍相公嶺賣馬安行大渡河牛纓換貸躋卭笮路出彭門緣劍閣火井秋篁截洞簫幾腔吹作雲南樂西菴集卷三
