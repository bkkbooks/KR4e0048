body:
  text: 西菴集卷五明孫蕡撰五言律雨中寄友客有還家夢空山雨正來寒生衣袖薄風急樹雲開掩户坐終日思君重幾回琴邊有清興能復醉深杯山中寫懷野館愁俱寂空林日未斜看雲偏憶母為客久辭家獨自嗟萍梗非關戀物華晚來山雨裏猶見杜鵑花光孝寺雨葉菩提樹天花薝蔔林塵機方外息幽趣靜中深野色連香積秋聲雜梵音隨緣僧供裏豫亦長禪心酬王道原鳳池鴛鷺侣幾載此南遷栁色迎征棹薇香憶盛年訟庭栽白蠟官步到紅船我亦金門客逢君思黯然過東阿懷雪蓬故人今不見孤客倩誰憐事業清時困名聲舊邑傳紫髯風獵獵紗帽月娟娟儻遂幽園約琴樽共晚年荔灣漁隱家住半塘曲沿回幾折灣門前荔支熟屋後釣舟間杳邈熊羆兆空濛虎豹關如何三里外便是五湖間五言排律翠筠軒為源上座題篁竹本修修僧房分外幽祗園栽未合因地養初稠苦節頭陀行虛心般若舟禪餘金粉落定起籜龍抽渭葉慈雲護湘枝法雨流斜穿瘞雁塔髙過講經樓色映菩提靜隂連薝蔔浮護持澆記日山偈刻枝秋挂袖踈螢度煎茶病鶴愁箇繁教略洗籬缺更須求臘紀應同祖清緣或共修移床看翠葆斫汗試銀鈎玉版供香積漁竿拂石頭風幡搖瑣碎月磬和蕭颼閲嵗開荒徑尋盟到野鷗間門邀蔣詡精舍候王猷石上攤棊局林邊列酒甌素琴調白雪彩筆畫滄洲興與梅花共心同造物遊更須三內翰飛錫問揚州七言律南山雜詠湘潭千頃碧波澄爭似南山一段青山雨欲來雲氣重江鷗飛去釣船輕詩成多是琴邊興老去應憐物外情間喚小童敲白石不知芳草夜來生峽山寺三首其三與鄭御史李踰國同登時再召赴闕峽束滄江萬壑雷棾王樓閣倚天開山從中宿城邊去水自連州港口來雲葉捲時猿獻果雨花飛處客登臺青鞋未訪和光洞奏賦金門亦壯哉竹裏維舟陟翠微間門臨水欲􅋂巇雲生佛殿飛來處猿嘯山僧出定時斷刻尚餘梁日記古松猶偃漢朝枝煙霞二妙應相笑盛世藏珍負夙期明日青陽逼嵗闌繡衣聊得共躋攀雲鋪鶴背浮金殿風引猿聲怨玉環薄宦豈堪長在客故鄉惟有一登山繩床睡暖梅花月輸與蒲庵老衲間逰羅浮三首白鶴峯頭春暮時水簾洞口鶬鶊飛千林錦樹化紅雨百道玉虹穿翠微神朝帝闕鶴為騎靈語仙壇霞作衣坐憐佳致惱魂夢應覔真人扣息機四百峯巒列海圖飛雲絶頂敞玄都丹砂五色時光焰紫翠中天半有無觀裏松株皆住鶴山中竹葉盡成符鐡橋歸去尋清賞爛醉仙人白玉壺四百峯巒拱御臺蕊珠樓閣倚雲開荔支花落山鳩語盧橘子生江燕來黃野故居羊化石葛洪丹竈錦為苔仙逰倘遂凌風約羽服黃冠亦快哉拜祖墓芳草凄凄夕照前獨將春酒酹荒阡已嗟世事成千古才説清明又一年滿目江山增舊恨幾家榆火起新煙從來俯仰傷懷抱不似于今倍黯然重過林氏别業曾侍先君訪太丘葛巾投老尚封侯青筠簾捲風生席白紵歌殘月滿舟興發共吟鸚鵡賦酒闌重解鷫鸘裘傳家幸有賢孫子别業新成似舊逰題海翁詩卷後海屋珊瑚幾度花仙籌長為記年華天晴霧雨籠蛟室夜冷星辰泊釣槎巢父詩篇留宇內嚴陵名字達皇家無因一遂神逰約共覔安期棗似瓜靈洲金鰲露背出滄溟撑拄惟應倩巨靈坡老留題空斷碣德雲種柏滿幽庭天寒怖鴿依江渚夜靜靈黿聽塔經畫舫圖書催入覲庾梅關北樹青青秋江送别千家城郭逺依依握手離筵話夕暉碧海雲深秋自老蘆花風急雁初飛客情猶醉千鍾酒書劒誰憐萬里歸慈母白頭應問信倚門遙識老萊衣送趙宣使之德慶阿翁髙步金鰲背南郡今留彩鳳雛名姓幾年通上國才華蚤嵗入中書花明畫省詩千首木落寒灘酒一壺若到康州煩借問故人黃趙近何如鍾山應制蒼翠巍峩插昊穹紫金突起大江東三山避迹投鯨海五嶽齊肩擁帝宫珠樹鳳鸞鳴瑞日寶圻龍虎壯威風萬年聖夀髙堪並常有神人祝華嵩新春從幸天界寺次詹冢宰鍾山應制韻天界叢林開象魏朱衣環珮儼羣仙瑞露迎鑾飛扈蹕皇都佳氣藹新年玉宸香滿三千界蓮座光浮尺五天敕賜御前催應制侍臣簮筆思如泉駕遊鍾山應制玉宸警蹕出蓬萊近望名山翠色開松柏屯雲車騎過峯巒簇錦節旄來九成奏樂喧泉澗百職聨班蹴磴苔燕賞太平當賦咏小臣侍從愧非才駕幸天界寺和朱太史芾韻宴語從容對上方侍臣揮翰筆如杠從行衛士隨僧供出定經聲歇棾腔鷲嶺曉雲扶輦轂龍河春水漾旌幢清平自覺文章盛長憶天兵未渡江陪翰林宋承旨遊鍾山天上禪關敞薜蘿每緣休沐得經過雲籠梵宇青蓮濕地接皇居紫氣多甘露結花凝木末醴泉和雨落岩阿欲陪謝傅金屛約未解朝簮奈爾何訶林送趙生留南歸幾年煙月共林坰此日看花入鳳城老我未酬清世念别君因起故園情朝廷有道容樗散獻納無才愧聖明歸去為煩先問訊滄江漁艇白鷗盟寄趙進士安中詞林每問歸安使聞説先生在德清暇日畫簾公吏散春風華館子襟明三年不見新書札百里空傳舊政聲日暮碧雲何處合思君吟遍石頭城送張典籍訥之官大同經歷三首春風鳴玉下天階萬里從戎亦快哉逺仗皇威清朔漠更依雲氣望蓬萊參軍孫楚登瀛客草檄陳琳補衮才邉事太平烽火息栁營羌角為誰哀邉陲見説青烽滅贊畫遙知白羽間夜月葡萄氊帳底春風篳篥栁營間賈生長是懷金闕定逺安能老玉關沙漠年年飛羽捷想隨驃騎凱歌還文章堂上論交日對榻哦詩白晝長晴日畫簾窺水映暖風羅袂散天香尋常應制才堪並四十從戎鬢未蒼春半黃河氷片解旌麾幾日望燉煌奉太史令護軍公虞淵捧日帝羽儀文事武備天人師筆端詞翰河漢決胸次韜略風雲隨邦基肇造古伊吕謨猷篤棐今臯夔畫圖麒麟盟帶礪仙遊更與赤松期投贈山東何方伯二首皇風來播南陲日開府兼持將相權千里分封鸞誥下三珠耀日虎符懸長憐野日違清顧且喜恩光照暮年勳業已成頭半白蔣陵佳氣麗中天君侯昔在東藩時英風逺略人共知帳前鐡騎金鎖甲腰下寶玦珊瑚枝將相兼權未足貴身名兩存今始竒便可臨風搔白首對酒且賦歸來詞送張翰林孟廉赴山西行軍二首漢將防邊意氣豪參軍行處擁旌旄雲連白雪飛花片風捲黃沙似海濤塞曲但聞吹篳篥人家多自種葡萄升平見説從戎樂欲解儒衣問戰袍清時况是金閨老躍馬關河鬢未華翠栁東門開祖帳黃河北岸擁髙牙安邉羽檄傳司馬落帽西風憶孟嘉萬里封侯吾輩事遲君談笑鎮龍沙奉酬劉友賢黎仲輝二御史見過故人驄馬曉相過錯莫鄰人避玉珂朝下楚城髙蓋合春深門巷落花多飛騰每羡青雲早衰懶無如白髮何相見惟期樹勳業蔣陵佳氣正嵯峩寄彭萬里給事時參山西政與君文采舊同朝翠管文立早上九霄輦路香風隨鹵簿天壇花雨聽簫韶鵷鸞一别京關逺雲月三年楚水遙欲寄清詩慰寥闃汴河東去近無潮送沈主事起復除西安知縣年少天官舊考功馬蹄催入未央宫聲名已在雲霄上鄉國猶懸涕淚中輦路繁花明旭日佳城喬木語天風傳家正欲存忠孝千古君臣此道同寄羅友章先生三年薄宦淹吳楚長憶先生在海涯不著朱衣垂玉佩還將白髮映烏紗遙天劒氣藏珠斗百越文光絢綵霞雲路相期苦相失春鶯啼徹上林花圜丘大祀松柏蕭森倚半空天壇髙峙帝城東宸旒肅穆千官合鹵簿輝煌萬國同上界清都移碧落泰階黃道隱晴虹相如莫獻青鸞賦不是祈靈太乙宫寄黃員外文博時佐守徐州使君文學冠賢科入拜工曹意氣多五色雲中披奏牘九重天上振鳴珂趨朝共沐恩波濶出守誰憐嵗月過會有蒲輪徵故舊未應黃髮老蹉跎送劉芳之入蜀峨眉西上穆陵關猶似簾櫳響珮環華月髙秋沉楚館綵雲清曉散巫山鸞襟寄恨今宵永錦字傳情幾日還惆悵風前花落盡相思惟有淚潸潸餞宋承旨潛溪先生致仕歸金華鰲峯朝日鵲聲稀內使傳宣下紫微豫告不須留祕閣許歸仍及賜春衣恩濃玉檢天書濕人去金莖瑞氣晞况是陽和二三月都門栁色正依依承恩初入詞林日亦得叨陪侍從班雲影九重開鳳閣天光咫尺近龍顔彤闈侍讀青春暖彩筆題詩白日間此去定酬優老願軟輪遊遍越東山保傅儲皇二十春白頭歸去嵗華新優賢寵渥非緣老蓋世文章不是貧錦誥渙頒雲五色青宫喜見日重輪懸知戀闕丹心在長倚遙天望紫宸一自先生離禁闥玉堂清致更無人金蓮揚彩初寒夕燕寢凝香散暮春著作有官惟故事論思此道竟誰陳青雲志氣慚悲梗不覺臨歧淚滿巾龍門佳致接仙山舊築茆堂紫翠間方外羽人霞作袂瀛洲歸客玉為顔常時望氣懷京國午夜朝真響珮環願祝聖朝千萬夀還隨笙鶴到天關贈修撰道夫蓬鬢飄蕭洛上翁金門日日候晨鐘論思入奏天光近對御題詩燭影紅衣故尚餘當日繡馬寒猶是舊時驄詞華已作青雲客聖代于今雨露濃西樵西樵山勢捲飛龍萬里扶桑海色通日麗錦巖開罨畫雨餘銀渚漾芙蓉紫河車蔭仙人掌白鶴花明玉女峯上相朝元鳴玉佩三城佳氣鬱蘢蔥懷修撰朱備萬先生舊是瀛洲客文藻風流第一人華月玉堂仙署冷西風遼海鬢毛新文園最憶相如賦茅屋誰憐杜老貧聖世雲衢需俊彥肯令漂泊暮江濵冬至冬至至日日初長久客客懷懷故鄉梅蕊惟愁雪爛漫栁條又是春相將懶朝違世真自笑憶逺寄書殊未央海門關外暮雲合應有南還征雁翔乙卯除夕四十今已過二年明日又復嵗華遷頭顱種種見白髮生計落落仍青氊梅花亂開客愁裏雲物長迷鄉國邊且可吟詩酌春酒爛漫取醉東風前鳳凰臺綺翮千年去已遙古臺猶見碧岧嶤楓林曉露迷三楚柳陌春風暗六朝狂客昔時揮彩筆飛仙何處捻瓊簫惟餘一道巴江水流向天門作海潮再遊鍾山空青樓閣窅冥間云是東南第一山武帝鸞旗煙草碧志公龍錫雨花間江光逺蕩黿鼉窟雲氣常籠虎豹關欲駕天風凌絶頂上方琪樹夕陽還懷舊遊寄李士行憶上髙臺望赤霄火輪光動彩虹飄鮫人夜織明珠佩龍女晨參絳節朝迤北關山周正朔平南將校漢嫖姚狂逰又是三年别海上蟠桃露氣銷寄髙彬條風二月古隋堤楊柳青青拂水齊萬里客懷將白髮一年春信又黃鸝親朋嵗久愁多望故國詩成醉懶題惟有别君情不淺夢中時到石城西送蔡九節還南安幾年為客怕逢秋每見春來憶舊逰歸夢夜隨寒雨急片帆春逐大江流看山有興還堪寫惜别從來不解愁斗酒殷勤拚一醉相思何處却登樓春興寄端方故居亂藤髙竹散清煙獨倚闌干思渺然流水浪隨春浦濶故人家住白雲邊三年逺别空相憶一段新愁自可憐欲得山隂晴夜雪東風吹放大江船送人還鄉嵗晏那堪送獨歸石門煙樹晚依依幾回客思愁江浦十幅蒲帆挂夕暉沽酒乍聞何處笛問程應為故山薇到時猶想多幽興一樂堂深見舞衣西巖圖為嚴彥恭題欲寫滄浪愧不才畫圖今喜見君開峯巒影落寒潭靜欵乃聲從返照來千頃白波龍伯國百年髙興子陵臺聞君早晚趨金闕風雨漁磯長緑苔懷白雲山房家住滄洲洲上山數椽茅屋亂雲間天晴疊嶂開金碧雨過清泉響珮環髙興别來長寂寞故人誰與共躋攀洞門猿鶴應相問何事先生久未還除夜大地白雪似白沙遊子况復未歸家寒雲黯淡暗海曲春風浩蕩來天涯楚山盧橘漸舒葉故園枇杷應著花未得乘船出京口枯坐旅邸如春蛙西菴集卷五
