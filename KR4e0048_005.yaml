body:
  text: 西菴集巻五明孫蕡撰五言律雨中寄友客有還家夢空山雨正來寒生衣袖薄風急樹雲開掩户坐終日思君重㡬迴琴邊有清興能復醉深杯山中冩懐野館愁俱寂空林日未斜㸔雲偏憶母為客久辭家獨自嗟萍梗非關戀物華晚來山雨裏猶見杜鵑花光孝寺雨葉菩提樹天花薝蔔林塵機方外息幽趣静中深野色連香積秋聲雜梵音隨縁僧供裏予亦長禅心酬王道原鳳池鴛鷺侣㡬載此南遷栁色迎征棹薇香憶盛年訟庭栽白蠟官步到紅船我亦金門客逢君思黯然過東阿懐雪蓬故人今不見孤客倩誰憐事業清時困名聲舊邑傳紫髯風獵獵紗帽月娟娟儻遂幽園約琴樽共晚年荔灣漁隠家住半塘曲沿囘㡬折灣門前荔支熟屋後釣舟閒杳邈熊羆兆空濛虎豹關如何三里外便是五湖間五言排律翠筠軒為源上座題篁竹本脩脩僧房分外幽祗園栽未合因地養初稠苦節頭陀行虛心般若舟禅餘金粉落定起籜龍抽渭葉慈雲護湘枝法雨流斜穿瘞雁塔髙過講經樓色映菩提静隂連薝蔔浮䕶持澆記日山偈刻枝秋掛袖踈螢度煎茶病鶴愁箇繁教畧洗籬缺更須求臘紀應同祖清縁或共修移床㸔翠葆斫汗試銀鈎玉版供香積漁竿拂石頭風旛揺瑣碎月磬和蕭颼閲嵗開荒徑尋盟到野鷗閒門邀蒋詡精舍候王猷石上攤棊局林邊列酒甌素琴調白雪彩筆畵滄洲興與梅花共心同造物游更須三内翰飛錫問揚州七言律南山雜詠湘潭千頃碧波澄争似南山一段青山雨欲來雲氣重江鷗飛去釣船輕詩成多是琴邊興老去應憐物外情閒喚小童敲白石不知芳草夜來生峽山寺三首其三與鄭御史李踰國同登時再召赴闕峽束滄江萬壑雷棾王樓閣倚天開山從中宿城邊去水自連州港口來雲葉捲時猿獻果雨花飛處客登臺青鞋未訪和光洞奏賦金門亦壮哉竹裏維舟陟翠微閒門臨水欲􅋂巇雲生佛殿飛來處猿嘯山僧出定時斷刻尚餘梁日記古松猶偃漢朝枝煙霞二妙應相笑盛世藏珍負夙期明日青陽逼嵗闌繡衣聊得共躋攀雲鋪鶴背浮金殿風引猿聲怨玉環薄宦豈堪長在客故鄉惟有一登山繩床睡暖梅花月輸與蒲庵老衲閒逰羅浮三首白鶴峯頭春暮時水簾洞口鶬鶊飛千林錦樹化紅雨百道玉虹穿翠微神朝帝闕鶴為騎靈語仙壇霞作衣坐憐佳致惱魂夢應覔真人扣息機四百峯巒列海圖飛雲絶頂敞𤣥都丹砂五色時光焰紫翠中天半有無觀裏松株皆住鶴山中竹葉盡成符鐡橋歸去尋清賞爛醉仙人白玉壺四百峯巒拱御臺蕊珠樓閣倚雲開荔支花落山鳩語盧橘子生江燕來黄野故居羊化石葛洪丹竈錦為苔仙逰倘遂凌風約羽服黄冠亦快哉拜祖墓芳草凄凄夕照前獨將春酒酹荒阡已嗟世事成千古纔説清明又一年滿目江山増舊恨㡬家榆火起新煙従來俯仰傷懐抱不似于今倍黯然重過林氏别業曾侍先君訪太丘葛巾投老尚封侯青筠簾捲風生席白紵歌殘月滿舟興發共吟鸚鵡賦酒闌重解鷫鸘裘傳家幸有賢孫子别業新成似舊逰題海翁詩巻後海屋珊瑚㡬度花仙籌長為記年華天晴霧雨籠蛟室夜冷星辰泊釣槎巢父詩篇留宇内嚴陵名字達皇家無因一遂神逰約共覔安期棗似𤓰靈洲金鰲露背出滄溟撑拄惟應倩巨靈坡老留題空斷碣徳雲種栢滿幽庭天寒怖鴿依江渚夜静靈黿聴塔經畵舫圖書催入覲庾梅關北樹青青秋江送别千家城郭逺依依握手離筵話夕暉碧海雲深秋自老蘆花風急雁初飛客情猶醉千鍾酒書劒誰憐萬里歸慈母白頭應問信倚門遥識老莱衣送趙宣使之徳慶阿翁髙步金鰲背南郡今留彩鳳雛名姓㡬年通上國才華蚤嵗入中書花明畵省詩千首木落寒灘酒一壺若到康州煩借問故人黄趙近何如鍾山應制蒼翠巍峩插昊穹紫金突起大江東三山避跡投鯨海五岳齊肩擁帝宫珠樹鳳鸞鳴瑞日寳圻龍虎壮威風萬年聖夀髙堪並常有神人祝華嵩新春従幸天界寺次詹冢宰鍾山應制韻天界叢林開象魏朱衣環珮儼羣仙瑞露迎鑾飛扈蹕皇都佳氣藹新年玉宸香滿三千界蓮座光浮尺五天勅賜御前催應制侍臣簮筆思如泉駕遊鍾山應制玉宸警蹕出蓬莱近望名山翠色開松栢屯雲車騎過峯巒簇錦節旄來九成奏樂喧泉澗百職聨班蹴磴苔燕賞太平當賦咏小臣侍従媿非才駕幸天界寺和朱太史芾韻宴語従容對上方侍臣揮翰筆如杠従行衞士隨僧供出定經聲歇棾腔鷲嶺曉雲扶輦轂龍河春水漾旌幢清平自覺文章盛長憶天兵未渡江陪翰林宋承㫖遊鍾山天上禅關敞薜蘿每縁休沐得經過雲籠梵宇青蓮濕地接皇居紫氣多甘露結花凝木末醴泉和雨落岩阿欲陪謝傅金屛約未解朝簮奈爾何訶林送趙生留南歸㡬年煙月共林坰此日㸔花入鳳城老我未酬清世念别君因起故園情朝廷有道容樗散獻納無才愧聖明歸去為煩先問訊滄江漁艇白鷗盟寄趙進士安中詞林每問歸安使聞説先生在徳清暇日畵簾公吏散春風華館子衿明三年不見新書札百里空傳舊政聲日暮碧雲何處合思君吟遍石頭城送張典籍訥之官大同經歴三首春風鳴玉下天階萬里從戎亦快哉逺仗皇威清朔漠更依雲氣望蓬萊㕘軍孫楚登瀛客草檄陳琳補衮才邉事太平烽火息栁營羌角為誰哀邉陲見説青烽滅贊畫遥知白羽閒夜月葡萄氊帳底春風篳篥栁營間賈生長是懐金闕定逺安能老玉關沙漠年年飛羽捷想隨驃騎凱歌還文章堂上論交日對榻哦詩白晝長晴日畵簾窺水映暖風羅袂散天香尋常應制才堪並四十從戎髩未蒼春半黄河氷片解旌麾㡬日望燉煌奉太史令䕶軍公虞淵捧日帝羽儀文事武備天人師筆端詞翰河漢決胸次韜畧風雲隨邦基肇造古伊吕謨猷篤棐今臯䕫畵圖麒麟盟帶礪仙遊更與赤松期投贈山東何方伯二首皇風來播南陲日開府兼持将相權千里分封鸞誥下三珠耀日虎符懸長憐野日違清顧且喜恩光照暮年勲業已成頭半白蒋陵佳氣麗中天君侯昔在東藩時英風逺畧人共知帳前鐡騎金鎖甲腰下寳玦珊瑚枝將相兼權未足貴身名兩存今始竒便可臨風搔白首對酒且賦歸來詞送張翰林孟㢘赴山西行軍二首漢将防邊意氣豪㕘軍行處擁旌旄雲連白雪飛花片風捲黄沙似海濤塞曲但聞吹篳篥人家多自種葡萄昇平見説從戎樂欲解儒衣問戰袍清時况是金閨老躍馬關河鬂未華翠栁東門開祖帳黄河北岸擁髙牙安邉羽檄傳司馬落帽西風憶孟嘉萬里封侯吾輩事遲君談笑鎮龍沙奉酬劉友賢黎仲輝二御史見過故人騘馬曉相過錯莫鄰人避玉珂朝下楚城髙盖合春深門巷落花多飛騰每羨青雲早衰懶無如白髮何相見惟期樹勲業蒋陵佳氣正嵯峩寄彭萬里給事時㕘山西政與君文采舊同朝翠管文立早上九霄輦路香風隨鹵簿天壇花雨聴簫韶鵷鸞一别京關逺雲月三年楚水遥欲寄清詩慰寥闃汴河東去近無潮送沈主事起復除西安知縣年少天官舊考功馬蹄催入未央宫聲名已在雲霄上鄉國猶懸涕淚中輦路繁花明旭日佳城喬木語天風傳家正欲存忠孝千古君臣此道同寄羅友章先生三年薄宦淹吳楚長憶先生在海涯不著朱衣垂玉佩還将白髮映烏紗遥天劒氣藏珠斗百越文光絢綵霞雲路相期苦相失春鶯啼徹上林花圜丘大祀松栢蕭森倚半空天壇髙峙帝城東宸旒肅穆千官合鹵簿輝煌萬國同上界清都移碧落泰堦黄道隠晴虹相如莫獻青鸞賦不是祈靈太乙宫寄黄員外文博時佐守徐州使君文學冠賢科入拜工曹意氣多五色雲中披奏牘九重天上振鳴珂趨朝共沐恩波濶出守誰憐嵗月過㑹有蒲輪徵故舊未應黄髮老蹉跎送劉芳之入蜀峨眉西上穆陵關猶似簾櫳響珮環華月髙秋沉楚館綵雲清曉散巫山鸞衿寄恨今宵永錦字傳情㡬日還惆悵風前花落盡相思惟有淚潸潸餞宋承㫖潛溪先生致仕歸金華鰲峯朝日鵲聲稀内使傳宣下紫微予告不須留秘閣許歸仍及賜春衣恩濃玉檢天書濕人去金莖瑞氣晞况是陽和二三月都門栁色正依依承恩初入詞林日亦得叨陪侍從班雲影九重開鳳閣天光咫尺近龍顔彤闈侍讀青春暖彩筆題詩白日閑此去定酬優老願軟輪遊遍越東山保傅儲皇二十春白頭歸去嵗華新優賢寵渥非縁老盖世文章不是貧錦誥渙頒雲五色青宫喜見日重輪懸知戀闕丹心在長倚遥天望紫宸一自先生離禁闥玉堂清致更無人金蓮颺彩初寒夕燕寢凝香散暮春著作有官惟故事論思此道竟誰陳青雲志氣慚悲梗不覺臨歧淚滿巾龍門佳致接仙山舊築茆堂紫翠間方外羽人霞作袂瀛洲歸客玉為顔常時望氣懐京國午夜朝真響珮環願祝聖朝千萬夀還隨笙鶴到天關贈修撰道夫蓬鬂飄蕭洛上翁金門日日候晨鐘論思入奏天光近對御題詩燭影紅衣故尚餘當日繡馬寒猶是舊時騘詞華已作青雲客聖代于今雨露濃西樵西樵山勢捲飛龍萬里扶桑海色通日麗錦巖開罨畵雨餘銀渚漾芙蓉紫河車䕃仙人掌白鶴花明玉女峯上相朝元鳴玉佩三城佳氣鬱蘢葱懐修撰朱備萬先生舊是瀛洲客文藻風流第一人華月玉堂仙署冷西風遼海鬂毛新文園最憶相如賦茅屋誰憐杜老貧聖世雲衢需俊彦肯令漂泊暮江濵冬至冬至至日日初長久客客懐懐故鄉梅蕋惟愁雪爛漫栁條又是春相將懶朝違世真自笑憶逺寄書殊未央海門關外暮雲合應有南還征雁翔乙卯除夕四十今已過二年明日又復嵗華遷頭顱種種見白髮生計落落仍青氊梅花亂開客愁裏雲物長迷鄉國邊且可吟詩酌春酒爛漫取醉東風前鳳凰臺綺翮千年去已遥古臺猶見碧岧嶤楓林曉露迷三楚柳陌春風暗六朝狂客昔時揮彩筆飛仙何處捻瓊簫惟餘一道巴江水流向天門作海潮再遊鍾山空青樓閣窅㝠間云是東南第一山武帝鸞旂烟草碧誌公龍錫雨花閑江光逺盪黿鼉窟雲氣常籠虎豹關欲駕天風凌絶頂上方琪樹夕陽還懐舊遊寄李士行憶上髙臺望赤霄火輪光動彩虹飄鮫人夜織明珠佩龍女晨㕘絳節朝迤北關山周正朔平南将校漢嫖姚狂逰又是三年别海上蟠桃露氣銷寄髙彬條風二月古隋堤楊柳青青拂水齊萬里客懐将白髮一年春信又黄鸝親朋嵗久愁多望故國詩成醉懶題惟有别君情不淺夢中時到石城西送蔡九節還南安㡬年為客怕逢秋每見春來憶舊逰歸夢夜隨寒雨急片㠶春逐大江流㸔山有興還堪冩惜别從來不解愁斗酒殷勤拚一醉相思何處却登樓春興寄端方故居亂藤髙竹散清烟獨倚闌干思𣺌然流水浪隨春浦濶故人家住白雲邊三年逺别空相憶一段新愁自可憐欲得山隂晴夜雪東風吹放大江船送人還鄉嵗晏那堪送獨歸石門烟樹晚依依㡬囘客思愁江浦十幅蒲㠶掛夕暉沽酒乍聞何處笛問程應為故山薇到時猶想多幽興一樂堂深見舞衣西巖圖為嚴彦恭題欲冩滄浪愧不才畵圖今喜見君開峯巒影落寒潭静欵乃聲從返照來千頃白波龍伯國百年髙興子陵臺聞君早晚趨金闕風雨漁磯長緑苔懐白雲山房家住滄洲洲上山數椽茅屋亂雲間天晴疊嶂開金碧雨過清泉響珮環髙興别來長寂寞故人誰與共躋攀洞門猿鶴應相問何事先生久未還除夜大地白雪似白沙遊子况復未歸家寒雲黯淡暗海曲春風浩蕩來天涯楚山盧橘漸舒葉故園枇杷應著花未得乗船出京口枯坐旅邸如春蛙西菴集巻五
