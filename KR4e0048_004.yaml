共蘭馥我亦能吟君好事好買溪藤數千幅聨篇寫作清風圖長使虹光貫岩麓題綿州同知曾傃古雪卷并序左綿在巴西之西其西為陰平又其西為雪山雪山起南廬接北劍橫亘數千里四時巘崿皓白一色每嵗六七月江流不雨漲涪陵激巫峽崩裂崖岸舟楫不得上下郡人曰西山之雪萬古不銷此迎日而化者其餘澌也望中瓊崖玉樹猶凛凛自若焉嵗八月豫以太常之節監祀於西川㑹賢倅曾侯錦江之東侯蘇人也修潔而文云在郡時開風軒𪠘宇之曲當西山之麓公餘退食日與寒光灝彩為對朋舊目其處曰古雪云邀余詩余為賦曰開風軒望古雪瓊崖瑶嶂千萬尋琪樹珠林互明滅此雪千年亦不消寒光灝彩長岧嶤火雲六月爍金石滕六萬片天花飄曾侯仙中人胸次同皎潔公餘對雪開風軒岩壑窗扇兩竒絶髙寒上與元氣通氷光百道飛白虹羣真縹眇下瑶席髙駕縞車乘玉龍我昨神逰共清賞羽服翛翛恣長往浩水花明載酒船天池月照披風氅峨眉蒼翠接仙臺縹眇坡翁跨鶴來桃花犬吠空齊裏黃竹柴門君自開題張侍儀貞白獨冷軒留侯之孫瓊玉相翛然敻立洞八荒顔如梅花開曉芳曲眉烟霏婉清揚朗吟碧空古洞章飄風流鈴韻何長璧月瑩瑩夜未央天壇萬籟鳴清商歸來人間寄徜徉寒山沍谷開雲房層氷嗟峨照座光虬龍松檜交青蒼飛廉怒號滕六狂舞霰不作天花香四簷銀竹聲琳琅山鬼獨宿神蛇藏漁童樵豎凍欲僵先生兀然方坐忘虛室生白萃吉祥金彪不躍龍不驤華池神水淡汪汪開元丹田內煒煌幽齊無人隙軒忩雲封茶竈籠筆牀故人山隂回酒航老鶴赤壁愁橫江神逰清都朝帝鄉珍珠為樓玉為堂羣真環珮參翺翔皆騎素麒白鳯凰塵中六月川氣黃我行汗雨如迸漿桂舟無楫川無梁安得送我置汝旁衣之織女青霓裳酌以西母玻璃觴頓令煩歊化清涼毛骨爽颯三秋霜題葉夷仲瞻雲軒天台之山天尺咫葉侯家住天台裏侯家兄弟聨班行總以才名佐天子大侯作縣多政聲小侯差小亦作丞鄉人聚首作密語阿堵名門生寧馨名門寧馨相濟楚大侯好文兼好武小侯詞賦亦驚人五言七言追樂府天台本與仙家鄰二侯亦是仙中人芝蘭玉樹曉輝映桃花流水春氤氲十年分散逰梁楚匆匆髙堂日將暮大侯去家已可憐小侯在官心更苦日想嚴親鬢已霜二兒有淚如迸漿凌風欲借雙黃鵠千里送兒還故鄉鄉中何物令儂羡雲去雲來千萬片雲來桑梓杳莫分雲去鄉關隱還見豈無揚子屋三椽亦有蘇秦二頃田同居貧賤心亦樂富貴逺别徒悁悁三椽足以庇風雨二頃寧當代禾黍宦逰經嵗復經年胡不遄歸奈何許丹陽水通東浙河儂今欲度水無波石頭艇子無錢買雲去雲來奈爾何題唐侍儀雙鯉軒唐生昔侍雙親時當庭日舞如花枝嚴親去世慈母在孝養足慰無窮悲唐生今年三十幾慈母髙堂尚多祉養志誰能論八珍作堂暫寄名雙鯉雙鯉雙鯉白且鮮日須二斗新銅錢寧勞姜婦水中覔不學王生氷上眠人生有親殊可樂親饌有魚尤不惡娛樂從兹到白頭聲名況是登黃閣我生我生纒百憂庭幃風木悲清秋為君援筆賦雙鯉每一讀時清涕流題孫典伏可居軒五宗孫子雲鶴仙荷衣蕙帶神飄然朝吟屈子逺逰賦夜誦莊生秋水篇五湖風月窮清賞青雀為艫桂為舫二女祠前聽鳯簫小孤洲北聲漁榜歸來匹馬逐嫖姚環珮鏗鏘近九霄承恩日侍金鑾殿卜築還依朱雀橋橋頭流水清如玉楊栁青青映書屋照座雖無鄂渚花當庭亦種沅湘竹沅湘竹色報春遲文玉疏疏只數枝客去每慿詩作伴朝回偏與靜相宜卜築不雕亦不畫㕔事門前僅旋馬髙題漢篆名可居君作其中可居者人生出處本無端坎止流行信可安君不見長安甲第連雲起贏得人間圖畫裏題荆徵士茂之藏楊補之梅花圖老荆好梅如好色嘉樹寧論萬金直屢乘泛雪王子舟長躡登山謝公屐萬壑千林秋葉乾飛鴻墮影報新寒塞北偏令百草折江南還得一花看此花看處真竒絶豹腳蛇鱗綴香雪楚女輕盈練素裙湘娥冷淡胭脂血破寒疏瘦未宜人照波臨水韻如真却月觀前新態度凌風臺下舊精神梅花萬樹先春發老荆此時情欲絶爛醉寧辭水部狂清吟擬補離騷缺歸來白髮老京華無復孤山興趣佳凍蕊枯枝誰更羡夭桃郁李世爭誇畫圖忽覩陽和面老荆手段却輕旋倣佛瑶池月下逢依稀庾嶺雲中見無情有恨獨遲遲世外丰容只自知黃閣由來皆貴眼楊郎老去負明時開圖見花被花惱有圖有花圖亦好月落參橫奈爾何江空嵗晏令人老老荆老荆吾所憐九還詮訣㑹當傳芙蓉實鼎丹砂熟去作羅浮峰頂仙題蘇明逺畫竹圖蘇郎畫竹如寫帖珊瑚為枝篆籀葉寒梢不及三尺長逺勢直與青冥接青冥不辨西與東雲光竹色俱空濛飛廉排山振鸑鷟霹靂迸火驚蛇龍竒搜不獨竹色老竹旁有石仍更好想其落筆當酒酣人間屏障愁絶倒近時吳興趙子昻最能寫竹窮青蒼蘇郎晚出繼芳躅湖海二妙相輝光十年不到瀟湘浦環珮空懷玉簫女相期共泛書畫船濃墨淒迷掃烟雨題楊肇初墨菊圖蘇郎墨菊真有香老墨落紙生秋霜宛然著我三徑底日與野老同徜徉生平愛畫仍愛菊令人見此二美足猶疑已是重陽過寒花落葉心簇簇憶昨蘇郎畫菊時君家數本方離披誰云清致不兼得更對濁酒開東籬明朝酒醒賔客去君獨沈吟空繞樹還看君家墨菊圖君家此樂陶家無題袁清溪所藏雪夜泛舟圖錢顒畫山工畫雪山下寒江更竒絶萬壑千林鳥倦飛蒼松古柏凍欲折清人何日縱冶逰銀濤渺渺著孤舟黃罌碧杓置篷底定是山隂王子猷故人髙居剡溪曲窄窄柴門鎖黃竹遙憐孤鶴怨空山塵榻無人伴幽獨披蓑童頭縮蝟毛龍鱗氷片難容篙凌兢厯覽有何好博得老眼如饞猫衝寒乘興莫匆促回船攏岸也不俗故人開軒掃茅屋問字床頭抗酒壺留連坐到東方旭題廉徵士夢雪舟廉生心性如野鷗前身恐是王子猷城居十載困炎熱夜夢泛雪乘扁舟扁舟一葉凌寒水更著壺觴篛篷底鼓枻疑過栁港邉乘潮似出沙洲嘴月華雪色氷玉同粼粼萬頃涵晴空明月上樓元氣白皓彩直與銀河通故人山隂無茅屋何處重尋剡溪曲惟應赤壁鳴皋仙夜半橫江慰幽獨題陳隱君菊莊卷後隱君種豆南山陲清晨荷鋤薄暮歸餘閒更學樹叢菊茅屋前頭花作圍此花不比桃與李萬木凋零方吐蕊耀日黃金淺淺紅凌霜白玉深深紫孤芳似與九九期落英不落長滿枝嫣然羞作兒女艷髙潔獨抱幽人姿此時隱君徐步屧晨光熹微風獵獵晚圃寒花語斷蛩東籬冷露留殘蝶洛陽金谷盛䋣華江渚芙蓉照館娃歌臺舞榭豈不好淡烟芳草令人嗟嵗華將暮衡門裏寄傲羲皇時隱几見月開籠放白鷴穿林採藥尋黃綺平生嗜酒仍嗜書詩比淵明差未如還開三徑望儔侣亦有五栁臨庭除素琴撫絃惟袖手葛巾且漉柴桑酒莫勞更賦歸去來惹得聲名滿人口題唐仙方伎圖布政徐本所藏九重春色浮金輦栁軃雕簷晝隂轉閣門無事簡書稀朝下三郎幸南苑仗底微風拂赭黃熏爐别殿送天香昭容婉孌翠娥黛內史委蛇宫錦囊飄飄野老來何許賜坐從容陪宴語卦氣初生石鼎丹清風自是蓬壺似奚童忽啓文書箱白騾隨地走如羊金華不識紫烟客那得化石初平方驪山未起朝元閣誰遣御前方伎作招邀青鳥天際來勾引霓裳月中落漁陽鐡騎戰塵生雲棧縈紆路不平此時安得仙翁術化作潼關百萬兵題桃源圖我昔城居困塵土十年不到青山塢扁舟夜夢泛滄浪鼓枻揚舲逐漁父江船沿洄落日低尋源直上武陵溪逶迤緑水春將晚爛漫桃花路欲迷尋源忽得青山口髣佛微香露林藪溪流已盡復潜通石洞斜穿不知久地廓川平景曠然還疑别是一重天迢遙山徑莓苔雨縹眇人間桑柘烟遙觀但見攢林木近入茆茨始成簇居人不改故衣冠井里猶存舊風俗風俗依依世上人皆言來此避强秦初期暫隱還鄉邑遂爾髙居隔世塵兒孫長大供衣食男事耕耘女蠶績春至桑麻雨露深嵗寒松柏星霜易東皋北隴恣鉏犂戴勝飛飛布穀啼傍舍雨晴雲外牧餉田日晏草中歸歸來路暗山光滅婦女繅車聲未歇舴艋仍教稚子撑漁罾更喚奚童結往來墟落只逍遙無復舟師下叫囂社日冬旬㑹村曲黃雞白酒話漁樵漁樵不識人間世雨笠烟蓑但容裔澗水氷融覺候和庭柯葉落知風厲問我何為作此來仙凡逈隔兩悠哉園裏青蔬為君摘瓦盆薄酒為君開東鄰西舍爭來聚相邀具酒猶炊黍旋除新竹敞南軒更掃落花開别墅初聞嬴氏好紛奢不謂山河屬漢家金雀重來飛灌木銅駝還去卧烟沙銅駝金雀何時已年代不知今半是世上紛紜日漸過山中嵗月誰能紀棹開酒醒悵蘧蘧却向山家對畫圖物外烟霞猶髣佛空中樓閣已糢糊糢糊髣佛何由辨只似當時眼中見鶴唳松梢露氣消雞鳴樹杪晨光炫臨風撫卷獨踟蹰欲寄桃源父老書澗户岩扉應未合筆牀茶竈近何如桃源桃源莫浪誇未必山林穢城郭車書四海今混同來享人間太平樂西菴集卷四
