body:
  text: 西菴集卷四明孫蕡撰七言古閨中聞子規交疏日射房櫳曉碧樹初聞子規鳥驚回殘夢了無歡慘切春愁破清悄獨宿何曽下繡幃寧勞勸我不如歸鶯花爛漫江南道好向逰人醉處啼晚發英德山城斗大臨江橫數椽茆屋炊烟青炎風吹林桂花落斜日倒影滄江明滄浪萬頃舟如葉舟子齊橈歌激烈一篙新水靜悠悠今日江頭雨初歇贈端孝思端郎白皙如冠玉葩辭麗藻撑滿腹生來未作九品官聲價蚤已驚流俗阿翁舊日尚書郎出領方鍞專衡湘掖垣休暇㑹賔客冠帶楚楚盈華堂憐君三十猶未娶却向窮簷守章句紛華滿目何足云昔者炎門今不遇楊花三月石城西翠袖紅裙滿大堤良辰歡笑暫行樂氷夜索寞猶孤棲興來呼酒秦淮屋宣州雪梨如碧玉坐中北客為燕歌歌得前朝數般曲看君顔面人中英暫時遜縮非避名鳯雛未必老丹穴謝安亦豈忘蒼生玉堂學士龍門叟日日談君不容口振翮青雲諒匪遙與君且盡杯中酒贈髙彬髙彬魁梧身七尺秀眉豐頰仍廣額幾年共食越江魚此中同作鍾陵客鍾陵上國要路津出門大道連青雲交逰脫略舊時輩拜揖盡是英豪人少年一字都不識近日能詩兼讀易看君意志肯如此世人見者誰不惜平生於我最知已旅邸浮沈托生死得錢慷慨即相贈歸家不問妻與子玉壺美酒桃花春酣歌每到清夜分衝人俠氣儼郭解不信窮愁如有神人生窮達何足道微名於世須亦早但憐零落故山雲未得相從逐幽討送何三元帥北上春風吹花江水波江頭楊栁緑差差臨歧送别增慷慨我與何郎情最多何郎昔年十六七明珠虎符光照室錦臂蒼鷹掣暮雲青絲白馬嘶晴日此時我作座上賔星樓月帳長相親班超英傑恥投筆孫楚兀傲猶參軍何郎嚴親初入覲何郎笑解封侯印鵲血弓弰滿壁懸青門瓜地從人問今年㑹晤蔣陵西爛漫鶯花醉欲迷梧桐葉落鳯臺曲楊栁烟籠白下堤何郎於我情最厚此别寧堪酌春酒平原北上路迢迢白雁南還寄書否題昭陽草堂手卷為增城縣丞謝英賦太傅風流一千載烏衣朱雀今誰在何時文水見文孫玉樹亭亭繼光彩茅茨還枕小東山山下銀溪玉作灣不獨澄江淨如練金屏想像如花顔陂塘别墅恣情適蕩漾寒波映空碧隱隱疑聞蠟屐聲青青似帶羅裙色羅裙翠帶總相宜君家兄弟況能詩細雨蛙聲來坐席淡雲疏影落漣漪南陲作郡無復意那更旁人知許事訟庭窄狹臨溪水日倩鷗羣伴清致清夢迢迢若箇邊鳴蜩初變柳盈園詠歌未必慚康樂俊秀真堪比惠連惠連别來年嵗久夢裏知能相見否且停憶草逺生愁便可巡池酌春酒伯仲聨翩圭組才聲名逺播鳯凰臺暫時分手何有哉行當聨袂赴青瑣莫學柴桑歸去來題髙彬白雲山房手卷髙彬昔年喜學武七尺長軀力如虎往昔追强過營門日來從戎事藩府錦袍白馬鐡連錢騎將校獵城南邊鼻頭火發不知熱耳後風生猶著鞭秦楚山川嵗華改萬人零落惟彬在腰間不插黃金符却向詞林學文彩白雲逺在藩府隂彬馳匹馬恣幽尋秦臺古樹掛秋色繞澗流泉清客心娛逰日夕歡不足更傍山腰結茆屋多種琅玕引鳯凰大開閒徑邀麋鹿雨龍歸洞白雲門靉靆綿聨忩户間月映餘輝長不夜雲拖暗靄似巫山山中白雲如白石髙彬與雲同枕席雲來萬樹似開花雲去千岩同一色何年作客帝王州却按新圖憶舊逰紅樹不知淮水晚白雲遙認故山秋故山白雲長自好且莫看雲被山惱他年謝病解朝衣我亦從君拾瑶草㑹鄉友京城客至沽新酒旅邸蕭條百無有秦淮釣得槎頭鯿旋學吳中膾魚手此時懷抱對君開況有同門故舊友醉裏時忘蔣陵道夢中猶記越王臺送張仲庸歸陜西虹亭臘月天欲雪洪州旅客歸心折秦關逺在黃河西行李蕭蕭待明發憶昔長安全盛年君騎白馬錦鞍韉五陵花月映紅袖京兆春風搖玉鞭年光去去如流水華髮棲遲簿書底却隨征鴈向南雲三載離家數千里浮雲往事復誰論近喜天書出午門埀簾事簡得休暇歸訪商顔山下村臨歧送君飲君酒五女峰頭握君手壯君行色百無有明年二月君到家寄聲為道平安否送髙文質逰杭州君昔從戎佐南伯歸朝名在驍騎籍有兒戳鎗能跨馬請官得應長畨役䋣華三月帝皇州馳道千花過紫騮豪俠應憐白日晚狹斜還作少年逰玉瓶一雙和酒絡九陌三衢縱歡謔白雪騧兒翠毯鮮石榴裙子春紗薄今晨告我武林行一束圖書畫舸輕賔客追隨白下里鶯花明媚石頭城蘇堤雨餘春水長三髙祠下聞漁榜冷泉濯足乘風歸野寺哀猿共僧往可憐雲水空西湖畫船邇來一隻無沈酣久矣厭流俗清泠正可娛潜夫武林舊日豪華國一一煩君弔遺跡明朝白馬擁波濤前代銅駝卧荆棘銅駝翁仲事應非惟有孤山似去時君行若過逋仙墓折取梅花一兩枝異橘圖憲郎髙隱林泉日種得江南幾株橘春日熒熒吐瑞花秋風磊磊懸嘉實去年起作京華逰臺端六月如九秋烏啼翠柏玉柯冷鶴唳璧山琪樹愁歸來風景慰吟目依舊䋣隂蓋書屋萬顆重埀丹井黃千頭再結龍洲緑緑映紅稀壓四鄰洞庭隱映波粼粼羲之帖就霜凝筆巴叟棊敲香滿身廣文有才過屈宋解撰王孫楚聲頌煩君採摘籠白鵝載酒談𤣥作清供白雲山白雲山下春光早少年冶逰風景好載酒秦他避暑宫踏青劉鋹呼鸞道木綿花落鷓鴣啼朝漢臺前日未西歌罷美人簮茉莉飲闌稚子唱銅鞮䋣華往似東流水昔時少年今老矣荔支楊梅幾度紅柴門寂寂秋風裏桑梓圖為左布政徐本賦君侯早嵗逢間關聲名出鎮三楚間江湘霖雨起諸葛環堵蒼生思謝安憂時兩鬢颯猶緑捧日孤衷明獨丹笑揮霜刃向戎壘倒挽銀漢清八寰功成入奏麒麟殿中外好官揚厯遍才華已羡冠西曹丰采還來照方面荔支香凝粉署㦸桄榔影入薇垣甸慿髙作賦羡才華拄笏看山憶鄉縣鄉縣迢迢路幾千齊安逺在長江邊石牛青嶂接巴蜀螺湖緑水通湘沅鷗飛竹樓笑傲吏鶴過赤壁懷詩仙回廊忽披生色畫一幅鵝湖萬金價書屋斜連洛浦隂漁船暝泊臨臯下天低故隴鎖松柏秋入平田熟禾稼征帆去住却無情王事鞅掌何由暇皇恩詔錫許歸榮稚子牽衣父老迎更植社蓮招惠逺添栽徑菊學淵明香醪再潑新醅白斷綺重尋舊譜聲匡濟老臣心未減却從江國望神京題石城秋晚圖送人歸金華金華才子天京客登眺京城壯心魄鍾嶽羣峰紫翠開巴江一道東南坼石頭艇子泛中流白紵清歌起莫愁雙闕五雲籠建業三槐髙樹接揚州烟景清清何綿邈對面楓林更蕭索月落烏啼北固城潮生鶴唳丹陽郭懷親作賦已堪憐更托新圖與代傳瓊珮暫辭丹轂下斑衣歸舞鯉庭前逺歸去去毗陵道歸日還應及冬早氷下寒魚暫可義霜餘槲葉行堪掃天官若奏選材臣應念詞林卓犖人君往承顔多暇日看花重入帝城春西塘圖為姑蘇吳隱君題放臣海曲懷京華孤旅天涯念鄉國誰傳此意入圖畫令我一見三嘆息毗陵野老吳中人舊與季子曽相親太湖三萬六千頃蕩漾咫尺閶門雲姑蘇臺荒烟樹緑下著詩翁數椽屋涼風洲渚芙蓉開細雨林園木瓜熟畫船撾鼓海天晴越女新裁白紵輕館娃宫暗暮雲合子夜歌闌春水生季家風流誰與比況是吳興外孫子曲几時攤舊賜書牙籖滿插前朝史南來無復少年狂茅棟低低一炷香久嫌塵居隘容膝更置别業開西塘西塘隱約湖山曲塘邊還種虎丘竹對酒菰蒲照座明捲簾鷗鷺當忩浴此圖風致真可人㸃染直欲窮天真平子愁來獨長詠張衡老去誰為鄰吾觀季子好風骨正好還家及秋律筆牀茶竈逐天隨蓴菜鱸魚莫相失贈皇甫隱士文逺羣英濟濟登廟堂無復幽人卧空谷胡為冠帶隱廛市有似山海遺珠玉先生風度與人殊面如赬玉仍秃鬚侯門不掛一步腳厭殺人間呫囁儒蔣陵白下清溪曲埀柳疏疏數椽屋藝忩磊落一萬卷客去自倚風軒讀秦淮買竹起髙樓興來酌酒樓上頭科頭舉白亂浮客胡琴羌笛聲啾啾賓朋自飲還自散先生醉眠忘早晏蒲葵巨扇醉不醒人定鐘闌始知飯沈酣本以陶性靈有時兀坐還惺惺屯䝉火足金母嘯卦氣白白升黃庭看君出處有妙䇿為人不遷亦不激隨時無怪互隱顯意欲不遣人人識我昨初交沈逸民卜居遂與先生鄰雪中長趿東郭履花下時掛淵明巾生平落落人少喜先生一見便知已非因性情酷相似安得傾倒能如此居安食飽即為家山林未必强京華君不見西湖處士骨已朽至今惟有寒梅花題黃萬户德清羅浮圖將軍昔年在東都虎頭鐡面專城居重營栁暗流蘇帳左掖花明金虎符東都郭外多林壑將軍公餘事行樂露冕旌􅓚隘北山行厨賔從如東洛紫雲白雲千萬峰羅浮更在二雲東古木千章排疊巚飛泉百道㵼晴虹仙家洞天三十幾羅浮敻出滄洲裏紫極房櫳倚日開蕊珠樓觀經天起餐霞道士不知年夜禮星辰誦內篇龍種玉芝耕赤谷鶴銜瑶草下青田將軍此時事幽討追攀極欲凌穹昊扶桑縹眇徐福舟輦路依稀漢陵道别來倏忽幾冬春京洛相逢車馬塵石室琅函仙夢逺朱衣瓊珮嵗華新新圖誰為將軍摸㸃染猶能記綿邈雨過琪花定滿壇星沈寶氣應連閣我與將軍總可憐逺遊經嵗復經年羅浮清賞如堪載同賦陶潜歸去篇贈關元帥景熙君在前朝帥東閫虎符三珠秩二品轅門禆將懸金章黃頭奴子州縣尹楊僕樓船下瀨時君隨左相入京師端門萬錢宴珠履輦路千花明錦衣天官宗伯司邦典藻鑑論君第髙選君言下國羇旅臣生來好武文筆淺願綰銅章佐北征還來作吏錦官城宣勞豈言爵髙下貴在晚節完虛名嵗華荏苒容鬢改朋舊飄零滿湖海晨星霜木餘幾人我與蟾溪老髙在前年佐縣淮山隂今春待詔入詞林比來奉節領祀事㑹面錯愕驚愁心郫筒新酒凝寒翠清夜懸燈共君醉醉來自起彈鳴箏一曲清歌數行淚有歌有酒君莫辭人生㑹遇信有時百年莽莽任所適不必借箸籌前期但憐奔波稀㑹面此去何時復相見明朝掛席下瞿塘我似伯勞君似燕戲贈端孝思君不見長安逰俠兒銀鞍白馬青春時朝出呼盧夜飲酒美人娟娟照忩牖若為君作梅花仙不隨桃李爭春妍臨流自敞書畫軒獨夜可憐邀月飲一春長是背花眠送何都閫濟南省親至京還廣伊昔關河事征戰君家嚴君擁方面君拜元戎領大藩虎旗耀日光於電北山之北南河南鯨波虎壘相巉巖轅門上日開將閫白馬朱纓銀作銜軍中呼盧日向午錦筵置酒夜擊鼓龍潭降卒解西歌翁源女兒學東語有時俘賊珠海頭海門六月如九秋牙旗揮天虎豹怒霹靂迸火魚龍愁銀漢淋漓洗穹昊嚴親入覲承恩早角巾還第誰最髙君與君家兄弟好朅來寧親東入齊歸舟一繫蔣陵西鶯花爛漫春如海歌舞流連醉似泥蟾溪髙彬故部曲開宴斗門橋下屋宣州梨子鵝兒黃吳姬指纎白如玉酒酣耳熱悲故鄉孫蕡在座情更傷關河北去五千里目斷南天如許長秦淮水生風似雨十幅蒲帆醉中舉龍灣江口辭故人小孤洲北失前侣知君第宅繞西湖門對羅浮列畫圖梅花白白想猶昨盧橘青青今有無三郎今年三十幾平生與蕡最知已明嵗春還若寄書玉堂華館西清裏送友自餘杭歸富春君住西湖已清楚胡為更憶莊遵渚歸舟昨日凌天風湖水秋風似秋雨憶昔狂逰載酒行畫船為屋花為城銀箏度曲對豪客紈扇題詩招小瓊小瓊雲鬟十八許自按紅牙歌白紵歌罷流雲咽大堤舞回落月低南浦髙陽酒徒散如雲君亦攜書隱富春俠氣未全消野興青蓑聊復謝塵氛富春世外真林壑不比西湖近城郭楊栁當門春正深珊瑚拂袖花初落英髦豈必老江濵天上應須有故人重著羊裘趨鳯闕還將髙卧動星文代內贈别二首君之去也青驪之駟不可追妾之留也凌波之襪不可隨僕夫倉黃戒往路斷栁錯莫留殘暉玉觴行酒和淚血問君此去何時歸何時歸亂心曲春風看盡長安花莫道新人如美玉君不行兮夷猶長風颯颯林木秋嵗云暮矣白日晚君之行也不可以久留山川悠悠靡終極獨立空閨長嘆息臨歧不得逐行蹤别後相思復何益水中摸月那得輪鏡中照影那得真百年長是逺離别魂夢相逢那得親往平原别髙彬銀壺緑酒沾春宴環珮朝回奉天殿平生不作兒女悲獨向髙彬淚如霰髙彬昔年桑梓雄好賢乃有古人風東林詩社靜來結北海酒樽長不空朅來弓劍已蕭索短髮如絲猶好客塞上葡萄火齊紅宣州梨子鵝兒白沈綿不獨重相知文采今還勝昔時小樓焚香每讀易净几把筆常題詩今晨我作平原别髙彬不意情欲絶芙蓉香冷不堪贈楊柳枝黃未宜折龍灣江口石城頭一幅蒲帆萬里秋暮雲紅樹儻相憶應有音書慰别愁寄訶林長老明靜照龎眉老僧無住著不問山林與城郭談禪到處即跏趺白晝天花如雨落心知一境萬緣空靜與晴霄海月同錫振春山常伏虎鉢含秋水自藏龍問師今年僧臘幾手種蒼松舊松子松身已作蛟龍鱗定中一念猶未起白石埀蘿净窈冥爐香一炷兩函經澗猿時擎野果供山鬼或倚寒巖聽荷為袈裟荔為帶世人見者皆再拜師言是悉有漏因我今已入無色界十年奔走亂如絲對榻論空不遂期每歎道緣於世淺惟師與我最相知寄羅都事文章梁侯昔在東藩時分符帥閫兼左司君為幕府貴賔客咳唾一落成珠璣君年於我當父執我才弱冠君六十惠然下作忘年交令我夜夢生撝挹靈鼇峰在江水邊清賞幾時同周旋題詩秋寫鳯林竹載酒夜泛蘭溪船蘭溪溪水清如練興盡回船復開宴水底潜蛟聽鳯簫波心皓月搖秋扇梁侯權勢盛莫當偏禆小校皆為郎惟君與我得禮貌過者嘖嘖盈路旁别來風物何可道華表青青但春草我騎驪馬走西東梁侯去矣君亦老人生本是風花枝升沈聚散何足悲優遊晚嵗謝微祿儻得從君林下期送都大尹使君家住餘杭曲年少狂逰事追逐蘇公堤上夜浮舟越王祠前朝擊鞠餘杭山水緑葱蘢一片西湖照晚空桂棹影搖桃葉浪菱歌聲徹竹枝風髙陽酒侣動盈席使君丰儀偏白皙湖光山色靜娟娟秋月氷壺影相射折節年來學讀書褒衣章甫逐羣儒已超藝苑時流上復恥陳編章句拘年紀今年三十七風流衆中稱第一有才作縣寧久勞銅章緑綬須暫屈石頭艇子泛清秋曉發金陵信下流已逐行雲經北固還隨輕浪到瓜洲生來我亦悠悠客邂逅論文心莫逆家住江南五千里送君又過江之北秋風淅淅江水波君行我留可奈何長亭日夕一壺酒從此關山魂夢多贈虹縣顔景明淮陽老人讀周易風吹鬢絲人不識興闌移席傍寒梅雙眼如猫對花碧天風毛骨江海仙偶來花下同清緣凌雲文采鳯凰見照室丹光龍虎全清琴調古無人續且可開樽掃茆屋胎禽起舞和雲謡山月光於畫樓燭送虹縣尹陳景明甲寅三月春欲盡我來洪州尋吏隱芳聲令譽誰最多太丘之孫陳大尹大尹昔是㑹稽人文章破的推殊倫奉天門下拜天子來作洪州司土臣文章固自不必道為官作事仍更好閭里小民持牒來撫摩直欲置懷抱洪州昔日盛䋣華大尹來時一百家稍闢丘墟攢井里旋披荆棘樹桑麻桑麻春深滿地黑更掠浮泥種牟麥接舍雞鳴桃李場生氂犬吠藩牆側祭社枌榆簫鼓鳴羣農皆醉吏獨醒羣農有酒只自飲相見不揖亦不迎官清事省無鞭撲縣治門前可羅雀種栁寧慚目老陶栽花直欲强潘嶽父老皆言大尹賢願留大尹更三年政成入覲不可住百里盼望心悁悁單車就道虹亭曲卧轍扳轅淚相續囊裏時無劉寵錢車旁肯掛時苗犢三年俸米鶴同餐焦尾琴輕古錦寒蕭然行李可一笑贏得車中裀面寬芙蓉花開亦已謝十月清霜被平野何因欲去更遲留父老相看不相捨黃河近日漲淮流車到淮陽當換舟送行父老在平地蹙額先作風波愁跨淮浮橋有客路我教兒男送君去便從淮右向琅琊却望丹陽登北固北固青山連石城城南之下是天京仙臺浮雲萬樹直帝里旭日千花明看花騎馬金陵道金陵行行須及早知君富貴心淡然功名得後亦良好宗伯金門奏美除政須賢令立髙衢天京到日知安穩多寄洪州父老書送翰林典籍張敏行之官西上燉煌城下沙如雪燉煌城頭無六月關西徑卒築防秋捷書夜半飛龍樓九重下詔徵貔虎推轂上將開都府黃旗捲日大軍行旄頭化石夜有聲燉煌迢迢五千里十月即渡黃河水上將翩翩才且雄平戎不數二師功叱咤猶在輪臺北匹馬已入渠黎國左校偏禆晚射鵰倚鞍醉索單于朝西山黑風吹墮瓦霜角吹秋塞垣下太平今見逺宣威君往從戎幾日歸幕下文儒兼解武詞林從此耀關西送崔振宗入幕初拋憲郎粟芙蓉照水搖紅玉鶚書迢遞吳山雲孤棹夷猶越江曲龍江二月千花䋣好客元戎開酒樽花前岸幘一回首應識前朝丞相孫捕魚圖小孤洲前春水緑泛湖小船如小屋白頭漁父不解愁往來捕魚湖水頭得魚換米納官稅妻孥衣食長優遊大兒十三學網罟小女七嵗能搖櫓江口賽神夜吹角村邊賣魚朝打鼓雨來維梢依古岸風起鳴榔入長浦荻芽短短桃花飛鱖魚上水鰣魚肥膾魚燒筍醉明月蠻歌唱和聲咿咿月明在天光在水但願年年只如此無風無浪安穩眠湖中有魚魚得錢過隋宫故址伊昔隋家全盛年周陳部曲按三邊端門徹夜笙歌合琪樹經春錦繡纒經春錦繡何搖漾别有迷樓九霄上連栱飛甍次第開朱簾繡柱森相向樓中美女花葱蘢寫翠圖黃映曉空璧月瓊花新態度臨風結綺舊丰容碧山螢火光於電更傍沈香山底宴窈窕清歌來夢兒輕盈妙舞蓮花旋行樂還來爛漫逰天京移蹕望揚州髙起離宫連鳯闕斜穿汴水入龍舟龍舟錦纜映牙檣玉簫金管切雲長仙禽自蛻葳蕤羽野鳥還為鸞鳯翔棹歌楊栁春風晚扇影芙蓉秋露