body:
  text: 西菴集卷九明孫蕡撰文祭竈文洪武戊午臘月下浣二十有四日𤣥隂告晏景翳虞淵雲斂髙漢斗斜孟陬室壁有煥孫子徙倚南軒弭節寄傲女流喧譁方夜祀竈詢其所由則進對曰今兹之夕逼迫歲除竈神趣駕入覲清都紀人善惡上達帝居宸旒翼翼有嚴走趨文昌桂籍廷尉玉符雷師鼓筆太乙啓書疏名某某以定賞誅吾儕小人職主中饋瓢長杓短米賤鹽貴奴婢笑嗔雞鳴犬吠柴荆狼藉毛血腥穢晨昏嵗時多負罪愧匪神包容恐獲罪戾霓旌戒路蕊闕洞開角耀黃道符平泰階東井振鐸艮風徐來飛廉前導列缺後推爰羅酒漿亦進籩豆餳糖馨香菜果鮮茂鵝鴨全牲糍糕美糗飲神醉飽楮鏹為夀口甜舌甘便利進奏矜恕愚頑庶蒙曲覆孫子曰嘻有是耶盍早語余鬱陶余衷久欲上訴倘因神明得列其故於是拂裳正巾屏息凝顧仰天叩頭望竈進步敷欽陳詞神聽無怒惟神名列五祀德具五行功存既濟位配離明調和鼎鼐烹飪殽蒸翕忽變化惟神之能司人之命實託死生老幼耋艾惟神是憑其在孔經于夏有事迎尸奧堂儼若禋祀非時媚瀆犯諂違義臣之於神其缺略也多矣兹者乃聞神以嵗終將入述職上天明明考績黜陟送行餽贐神所不斥少君之祠神憫其癖王孫之諷神怒其激神寬以仁好是正直稱觴表誠并獻臣臆臣少薄祜零丁羇孤佩服先訓忝名為儒逺祖顔孟近師程朱立志不羣抱道匪渝𢎞深典謨詰屈盤誥連山歸藏卦象精到羣葩分敷列宿穹昊騷怨而響莊荒而傲班范旁通荀揚曲造昭彰隱微洞徹突奧懸燈墻壁蓄火爐竈詰朝喃喃達曙叫噪臣之於讀書可謂勤矣靈臺丹府性之郛郭徽猷懿行人之天爵湛然內觀秋月灼爍盎然外和春靄林薄雲影天光鳶飛魚躍浮烟斂散青山猶昨軒庭雨餘草色如濯臣之於性理亦略通矣發舒藴積學為詞章文摛藻繪詩詠鳳凰韓筋栁骨玉潔金光鋪天炫耀擲地鏗鏘鸞堂鳳閣冠冕琳琅緑窗青瑣粉艷蘭香閒雲野水慘淡微茫牛神蛇鬼百怪千狂曹劉錯愕董賈回惶海若宵哭山精晝藏臣之為文可謂有成矣荒雞一鳴播水運帚趨蹌堂庭問候安否嵗時伏臘親姻具有既慈妻子復愛朋友切磨童稚理義盈口恩養輿𨽻食均衣厚浮雲市金不羡玉斗峻節清霜寧慙甕牖臣之於內行可謂無愧矣恭承嘉澤惠此眇軀天庭冠玉地角秀鬚褒衣巍冠玉佩瓊琚周旋步武規矩不渝臣之外貌可謂不俗矣英英其貌濯濯其儀身長七尺六寸有竒人不識字臣吐珠璣人不能言臣如塤篪識雖固陋不為無知材雖朴鈍亦足有為行逢羸餓如箭入肌嫉視奸邪眼火發輝思展抱負試于清時朝登金門暮集鳳池致君堯舜還俗雍熙臣之立志可謂寥廓曠絶而不凡矣然而時命大謬進退惟鞠圖封得黥獻璞遭辱山非太行車折其軸水非瞿塘舟破其斛陽和遍地不被槁木赫曦流金不照沍谷叨領鄉薦頭彎工局佐令淮陽塵隨馬足一入詞林旋罹斥逐之官濟上還尋治獄對欵臺端拘攣瑟縮論輸左校親忝板築猶賴仁恩得解桎梏餘生幸存殘喘僅續委頓風埃顛連水陸越山之陽瘴海之曲荆榛為門茅草為屋寒衣結鶉饑飯脫粟嚴冬露肘稔嵗枵腹心摧意沮魄畔神促靦顔細君取笑僮僕撫跡如此何賦豫之酷與臣聞氣運之塞有時而通屈若尺蠖奮若𡨕鴻相彼萬類天無不容鼠安于穴蟻樂于封蒺藜膏雨勾吻春風鄙瑣齷齪飽鮮􅒬醲絲粟么麼曳紫紆紅不論巧拙秖繫其逢臣獨何人坐此困窮今臣年甫不惑未踰知命寒心雖灰宿志猶徑威如怒彪氣如炊甑寧甘溝壑殞絶其性嗟來可食蒙袂斯病焚山可出抱樹非正餔糟啜醨剗彩埋瑩與時推遷乃道之聖臣欲抑氣變志改轍更絃毁裂冠冕焚棄簡編鄧林擲槧麗水投鉛言歸軟美步習輕便突梯婉孌媚俗稱賢左擇豪曹右挽繁弱臣學班超建功大漠萬里開邉三時錫爵揚威玉關圖畫麟閣黃金璀璨白玉輝煌臣學齊奴起第洛陽朋遊滿座女艷成行雲攢綺縠鼎沸笙簧緑幘蒙頭蒼鷹在手臣學董賢徜徉花栁登場鬭雞擊鞠賭狗結交醉徒終日飲酒白虹貫日黃霧塞空臣學五侯同日受封車如流水馬如游龍氣凌七貴坐壓三公載膏其轅載秣其馬臣學子長遍歷天下楚水秦山燕都越野狂遊縱觀胸次披寫龍蟠丹鼎鶴唳紫煙臣學方朔去為神仙日邉蓬萊海上樓船憑凌八極瞬息千年撥車參禪含光蓄耀臣學達摩靜觀衆妙天垂寶花日麗靈竅塵空道成萬古凝照盡以臣之勳業束置髙閣回舟洙泗輟棹關洛望罷伊周結交管樂放意舒顔解粘釋縛逍遙為城浩蕩為郭滔乎大荒亦孔之樂天鑒伊邇必從臣求神明有靈可達此否下民之疾上帝之憂神之聽之無作神羞言訖再拜俯伏俟命潛心默存側耳靜聽時夜將半霜露凄凄勾陳影轉析木光低缺月入户靈風振幃車從雜遝若神來歸恍惚夢寐有告余曰嗟爾來前帝有德音爾其聽之罔敢弗欽帝聽爾詞懇至悽惻金童嗟嗟玉女嘖嘖爾詞雖苦運則未通身若泛梗意如飄風凡民之生命各有定祥灾吉凶順受其正貴賤修短莫非自然枉道妄求徒取咎愆盜跖之夀顔回之夭交錯紛紜非爾能曉匪仁莫據匪義莫依此爾之分爾其安之爾雖不豐亦未為薄蘧廬夢中獨爾先覺醯雞螻蟻所得幾何爾於造化取適已多豁爾殷憂𢎞爾髙識配以大中以受多福言訖更窮去影遄息豫起拜命服之無斁詞關敏廟詞風英英兮龍堂海窈影兮雲流芳蜀椒佩兮越紵裳中牢殽兮交桂漿新宫峩峩兮侯故鄉侯船來遲兮我心傷忠零連兮既展困羣氛兮未逺采青菱兮驚波延素月兮烟苑以身易名兮樹此孤蹇哀如飄風兮山宿之顯枇杷青兮金斗黃千秋萬夏兮侯食此邦雲旌旗兮雨干將佑正直兮誅姦狂臯歸乎來兮噫侯可忘飛仙歸來詞并序武林朱以方隱居好詞章尚奇嗜古之士也寓越之河陽作亭樹以竹木畜胎禽三數羣𤣥白輝映旦放于海山之曲暮則揮白羽扇以招之題曰招鶴軒豫惜其有聲無文故為作飛仙歸來詞以助其嘷呼之音詞曰飛仙兮歸來無徘徊乎臨臯蜀江雪落灘嘈嘈潛龍起舞風怒號霜明赤壁山月髙瓊琚仙翁夢魂勞飛仙兮歸來無容與乎青田春龍破玉耕紫煙羣仙環珮聲鏘然思乘逸響盤九天羽衣不得長蹁躚飛仙兮歸來無留戀乎髙軒華衣巍冠多禍愆漳河之水流潺湲商都緑草生芊綿崇居廣厦不可以久延飛仙兮歸來無嘹唳乎華亭琳琅金薤慚世英文章錦綺身後名終古白璧多青蠅三吳雲間不可以久寧飛仙兮歸來無浩蕩乎遼海離家一去三千載蜃氣罡風晦文采華表凌寒欲誰待城郭如故人民改飛仙兮歸來歸翺翔乎餘杭武林水緑山青蒼海潮八月來錢塘潮頭白馬神龍驤西湖海風菱芡香三髙琪樹可以棲𤣥裳飛仙兮歸來歸同隱于越山臨清屠蘇雲半間晴窗月榭開雕欄前楹翠筠玉珊珊素琴鳴絲朝罷彈匏樽濁酒可和顔衣汝以五彩之春雲食汝以百斛之琅玕軒庭不驚樂且閒飛仙歸來莫盤桓和歸去來辭自平原回作歸去來兮離家十年今始歸返故園之初服抱去國之餘悲慕古人之逺引髙風邈其難追嗟弱齡之昧道及暮齒而知非回獨軫於修途振江海之輕衣望松楸其匪逺睇桑梓之依微爰憩我馬自兹驚奔復掃花徑重開蓽門朋舊載過宗族具存既列琴瑟亦羅匏樽俯清泉以濯足蔭嘉樹而怡顔喜塵緣之靜盡覺靈府之閒安挹涼風以抗牖延素月而開關極林野之清娛縱卉木之奇觀嵗將闌而獨往日既夕而忘還感風霜之交集立檜柏之桓桓歸去來兮罷吳楚之宦遊撫四方者倦矣獲素願兮奚求窮嵗時以靜賞攄夙昔之煩憂侣漁樵於山澤服稼穡於田疇心淡止水身如虛舟慰佳辰以雅集散遐曯於髙丘慨吾年之日邁閲逸景之星流守窮閭以待盡依先隴之餘休已矣乎人生㑹遇良有時丹崖緑壑不少留世路如此將安之心與造物遊全歸以為期問桑麻於井里課僮僕之耘耔飲柴桑之薄酒詠秋菊之新詩信流行與坎止達生委運其何疑西菴集卷九
