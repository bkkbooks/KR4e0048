body:
  text: 西菴集巻七明孫蕡撰七言絶句紅菊龍山九日宴斜曛萬朶秋香散彩雲醉㟁綸巾對芳物西風應識舊叅軍靈均且莫怨清醒楚水朝雲炫落英宿酒未平佳節過西風吹帽最多情墨菊熹微衡宇露初乾九月江南動早寒肺氣暫平新㫁酒天香零落醒中㸔三徑松門掩翠蘿白鷴飛去曉霜多天隨艇子無人共寥落寒香奈爾何紅梅瑶池王母閬風西夜晏羣仙錦繡幃月落參横天向曙醉騎丹鳳繞湖歸丹青學冩夀陽姿艶杏仙花嫩柳枝猶記醉邀何水部淮西歌吹舊臺池墨竹九首洞庭春盡水溶溶錦瑟輕寒起卧龍行客欲投蒼水佩亂雲遮㫁九疑峯誰拈秃筆冩凄迷亂石横江碧玉低猶記畵船初泊岸落花時節郭公啼虹光雲影緑參差赤壁艅艎晚更移春雨乍晴燒玉版鰣魚上水鱖魚肥陽雲臺下曲江頭一徑笙簫萬頃秋莫向晚凉歌白紵碧叢深處有鉤輈秋寒萬玉倚雲青青入君山白鳳翎偷得雲和千載曲夜深吹與老龍聴昨夜春雷震楚山籜龍驚覺錦斑斑峨眉老客禪心在應化横江老鶴還巖上烟消見日光歌聲遥隔水雲鄉漁翁莫汲清湘緑留取髙枝宿鳳凰澧水春隂午未消寒梢低護木蘭橈天涯風物餘空翠應是英皇淚㸃飄葳蕤萬玉曉撑風應是清溪野水東更畵接䍦顛倒著嫩涼添我緑隂中王孫圖二首一挾彈一聴鳥誰拈金彈倚青驄鞍面開元結束同好似華清二三月緑隂籠仗入離宫東風馳道直如絃琪樹春隂䕶馬韉從幸少年初賜錦數聲啼鳥落花前宣和樹木翎毛上林芳樹藹崇宣澹墨踈翎膩粉牋何似白榆棲凍雀蕭蕭風雪滿祁連折枝桃花圖扁舟獨上武陵溪花暗漁郎路欲迷忽見畫圖驚一載東風憔悴一枝低桃花白練沅江江口武陵溪翠影紅香粉翅低為向東風煩寄語莫將春色到安西楊妃出浴浴罷温泉體未乾斂襟非為玉肌寒伊誰一搯痕猶在只恐三郎著眼看楊太真對鏡圖舞鸞金背隠清光中有開元堕馬粧一線枕痕春色淺夜來知是夢漁陽梨園按樂白雪飛香玉作城霓裳度曲按新聲東風吹醒漁陽夢一段春愁畵不成村嫗牛圗玉環迷恨馬嵬坡出塞明妃淚更多何似阿婆牛背穏春風一曲太平歌昭君五首莫怨嬋娟堕朔塵漢宫蕃地一般春皇家若起凌煙閣功是安邊第一人曉來氊帳理鉛華對鏡偷憐復自誇如此玉顔君不顧更從何處選良家閶闔龍鱗開玉陛嫖姚馬影度旌旗誰憐漢道昇平日是妾漂流薄命時囘使殷勤莫寄辭君王此去苦相思容華自昔能傾國只為風沙逺别離玉顔啼淚濕龍沙東望長安不見家月滿穹廬愁似海强將心事付琵琶題葡萄驪龍弄影照髙秋萬斛明珠露氣浮還憶玉人歌舞散紫駝銀甕出凉州雜畵十首曽記東林信杖藜逺公門對石橋西長松月落猿聲歇贏得青山似虎溪羅浮山水滄江曲水連清溪樹連屋舊雨仙翁乗興來荔支應過楊梅熟溪雲漠漠樹宛宛不是三湘定輞川花氣曉迷桃葉渡虹光夜貫米家船小甕松花已潑醅縛柴門子夜長開天寒動有王猷興應放清溪夜艇囘驚濤一葉海門關秋淺吳楓未著斑十載宦逰今㸔畵澹煙斜日小孤山不見扁舟採芰荷天風何處度清歌芒鞋此日雲門寺應是鑑湖秋水多望湖亭上倚清秋水落呉城樹色幽何日松巢招五老九江同泛釣魚舟愛此名山似蜀中山如斑笋樹如龍瞿塘㡬日漩渦小欲駕扁舟訪赤松沾恩㡬載入承明雲冷漁磯白鶴盟忽見新圖被山惱欲辭簮組乞歸耕白鷺洲前野艇歸釣魚磯上緑楊埀人間野况都如畵奈此窮生薄禄為四皓圖只合餐芝老萬山誰教鶴髮動龍顔蛾眉對酒歌鴻鵠怨入商林紫翠間畵梅四首風烟雪月㳺龍扶風飛上天明珠萬斛争春妍師雄醉夢颯驚覺羅浮月墮西湖邊梨花香冷月隂隂青女横陳萬玉林繡箔珠簾人不見相思無地著春心小國佳人窈窕娘春風環珮素綃裳千年獨抱靈均怨夜結明璫獻楚王仙樓十二敞春風千樹桃花似錦紅瑶水玉娥清宴罷素鸞歸去月明中松雙松如盖倚雲長曽憶匡山問草堂拂石坐來龍影濕半陂春雨茯苓香梅天風吹墮白霓裙五嶺雲深路不分千丈玉階尋步襪碧牀香落始知君嘗草圖蒺藜勾吻總青青慚愧春山草木榮㡬欲騎龍叩天闕緑章祈雨䕶黄精舞馬圖霧鬛風鬃錦彩鮮登牀旋舞更翩翩青騾祇識連雲棧不解銜杯獻御筵送翰林宋先生致仕歸金華二十五首海内才名五十年聖恩榮許晚歸田金華父老如相問曽是瀛洲第一仙新賜宫衣雪色如歸榮况及早春初公卿祖帳都門外人道風流似二䟽二十餘年侍禁闈趨朝常早晚歸遲春坊一掬臨分淚記得埀髫受業時門生日日侍談經獨向孫蕡眼尚青㡬度背人焚諫草風灰蝴蝶滿中庭千載班揚亞六經先生髙步續芳聲髙麗日本朝王使長向仙班問姓名萬丈文光北斗懸清名不獨域中傳雞林買得潛溪集已向扶桑石上鐫頭白勲庸列上卿君王豈是重文名朝廷禮樂新寰宇半是先生撰次成㡬逆龍鱗進治安朝囘只說聖恩寛小儒日侍絲綸閣不得囊中奏稿㸔令子内庭書制誥佳孫復作序班郎一門三代沾恩澤更著錦衣歸故鄉事業文章滿汗青白頭歸去世縁輕雙溪水繞長松下只讀楞伽一巻經紅鞋金帶荔支花三品詞林内相家歸去山中無箇事瓦瓶春水自煎茶盖世文章未是雄真純卓有古人風賜金長是沽春酒醉殺鄰家桑苧翁乞與山童潤筆錢歸時正及早春先玉堂分取薇花樹種在雙溪淺水邉玉樹芝蘭取次成小孫開嵗亦能行懸燈夜讀元朝史認得前編老祖名不用黄牛教子孫為儒三世受君恩却將視草堂前筆歸去題詩水竹村山僧野客莫相過碑板人間刻已多從此黄庭不須讀自開池水養羣鵞榮歸詔許老山坰火棗交梨養性靈秘府圖書翻閲盡却從方士借丹經近欲長叅不語禅水雲飛盡月輪圓惟餘一册龍門子留與西江學者傳後學無師誤少年在於蕡也更堪憐聨班欲上陳情表留取先生住講筵華髮朱顔六袠餘還鄉猶駕軟輪車龍江關吏如相識應止青牛乞著書祖考榮封寵數優君王親為製詞頭臨流好起雲章閣髙壓清風八詠樓羽衣來自大江西打得旌陽鐡柱碑聞道珊瑚纒藥石碧潭清夜老龍嘶建業鐘殘禁漏稀九重天上早朝時玉堂清署風霜冷常恐先生入奏遲鳳翥龍飛御製文人間未見墨花新恩榮獨為詞林重親向宫門賜老臣晚出金閨望故鄉芙蓉峯影月蒼蒼歸途跨得銀鞍馬原是天閑小乗黄寄髙彬條風吹緑滿蟾溪蠟屐行春日向西獨木橋邉烏桕樹鵓鳩飛上上頭啼寄王彦舉緑楊隂下玉騘嘶絲絡銀瓶帶酒攜夢入南園聴夜雨不知身在蔣陵西寓居傳小樓懐以成故人何處艤蘭舟誰念西窓客滯留賴有姮娥憐寂寞流光偏照讀書樓臨清軒題壁思君㡬日不相見特向城南問隠居巢鶴不驚流水静一爐香炷數編書憶得四首憶得垂髫少小時青燈黄巻日相隨于今放浪江湖上一段閒情緫付詩憶得初年不解愁藥欄花逕日風流臨池書罷黄庭帖走馬城南覔舊逰憶得栖遲泉石間衡門無事鎖常關日長書困南窓下燕子驚囘夢裏閒憶得曽陪紫府仙風流儒雅興翛然夜來貪玩西窓月花影侵堦尚未眠龍江夜泊蔣山山頭秋月明龍江江上暮潮生行人又是金陵客卧聴西風鼓角聲過揚州二首江上垂楊覆白蘋斜陽啼鳥㫁吟魂朱樓翠箔今何在一帶寒城鎖暮雲垂楊白白折殘枝春盡瓊花作雪飛少日狂逰今是夢竹西歌吹舊臺池下邳淮南五月叫春鳩花落清河錦浪流偏恨寂寥鄉思裏澹烟寒月下邳州吕梁洪驚濤觸石雪潺潺五月河風尚作寒問訊南來荆楚客官船㡬日到淮安聊城雨浥頹墻草翳空魯連千載見髙風愁來自撚鴉翎箭日落登城射㫁鴻聊城見荷二首疎疎寒緑間天香細雨微風澹曉粧憶在古原山縣裏寂寥三載負紅芳花不成粧藕未乾嫩紅新葉捲輕寒官河水落南風小不似賀家湖上㸔武城獨上荒城野日隂絃歌千載憶遺音黄堂皂盖成塵土何處春風緑綺琴過茌平望嶧山邑敝天寒草殞青授經誰弔伏生靈巉巖石刻雖竒古終慊沙丘混鮑腥周公帝子揮戈復故都三監才畧佐鴻圖扶危不仗蒼髯老誰奉新王六尺孤范蠡已作江湖物外仙歸舟誰遣載婵娟登樓有客思傾國幾度臨風夜不眠伍子胥忠言極諫起君猜宰嚭䜛行劒賜來從此强呉隨作沼果然麋鹿走髙臺黄歇終古天心不可虧隂謀祇是得傾危春申便使能成事只似秦家吕不韋荆軻悲歌慷慨髮衝冠上殿披圖却膽寒生刼詛盟縁底事錯將秦政比齊桓昭陵萬里山河㡬戰征阿爺機不見先明春城鼓吹黄金甲肯伴藩臣奉乃兄苻堅戰鬭争雄國作墟讎民恨不總為魚誰云未得降王長先向長安為卜居二喬中原落日一星黄虎躍龍跳有底忙漳水鳳臺髙百尺小姑何用嫁劉郎赤壁百里旌旗蔽楚天黄龍青雀化炎烟可憐釃酒臨江上正是孫郎躍馬年魏臺魏臺金雀舞晴空劔閣雲烟起卧龍詞客倚樓空作賦不騎羸馬向西東姑蘇臺嫋嫋江風泛玉臺荔支香老木𤓰開蛾眉不飲盃中酒日暮閶門野鹿來靈岩寺屧廊猶記館娃名照水荒臺草自青㡬樹芙蓉依水閣雨餘西子醉初醒姑蘇開元寺梵宫春盡落花時倦鳥猶啼竹樹枝想見風流唐太守緑隂滿院坐題詩望九華山一葉扁舟渺漠間白雲飛處九華山生來自有清幽興每被微官誤却閒過赤壁樓櫓炎烟舊事非留題孤壁日斜時周郎慷慨空横槊如此江山不賦詩過荆州髙情長記仲宣樓醉裏臨風賦倦逰千載詞華人似玉客船今日過荆州巫山巫山髙髙知㡬重朝雲暮雨楚王宫人心對面有巇險更勝髙唐十二峯出蜀二首白帝秋髙木葉黄蜀中長是雨浪浪瞿塘水落漩渦小一路㸔山到洛陽雄風淅淅雨凄凄啼殺春山蜀子規江到岳陽舟楫穏夢魂從此怯巴西次張仲舉詩韻四首重重疊疊水南峯五五三三石上松釣艇蕩歸春雨足草堂猶有白雲封江上依稀栗里峯峯前隠約故園松征鴻盡向南天沒不為離人寄一封逺逰三載别青峯見畵長思問竹松歸棹五湖烟水濶柴門應有落花封雲連江上九華峯露沐仙家五粒松但使風光如畫裏餘生不羨五侯封幽居雜詠七十四首自洪武十一年平原還家作也仙衣自種一池荷采采青黄當綺羅怪底邇來秋氣早水禽飛去曉霜多紈綺紛紛㡬戰塲閒身贏得水雲鄉扁舟日暮鳴榔去付與沙鷗管夕陽少日三呉樂事饒木蘭船上醉吹簫松風驚覺㳺仙夢疑是錢塘八月潮自别瀛洲鶴背寒石田茅屋嵗漫漫梅花幾樹先春發猶自金蓮炬照㸔學鍊還丹嵗月遲要觀滄海倒枯時人間甲子成何事不似山翁一局棋偶趂新涼理釣船秋雲映水色澄鮮漁童解撒攔江網賸得槎頭縮項鯿淺水漁船學搶風竹竿斜著抗孤篷青蒲葉底寒波起吹入蘆花别港中野老烹雞㑹四鄰瓦盆盛酒亂無巡風林自奏陽春曲一日鶯聲到夕曛逺公蓮社乆相招老大無心到石橋遥想東林山月出白猿啼處樹蕭蕭十載山中讀道經石壇烟雨桂花生年來賣藥長安市漸喜無人識姓名隠去無心戀嵗華惟同野老問桑麻門前莫種青青栁怕有人呼縣令家酒伴詩僧日見尋髙歌劇飲坐檉隂留連莫怪盃中盡賸有床頭舊賜金髙原極目浩茫茫鳥盡遥天若箇長一片夕陽秋草地不知今古㡬興亡醉裏臨風弔屈原楚吟空賦逺逰篇凌空語意誰能解千古惟應待我傳試學鴟夷物外情水雲空濶釣舟横従來用盡無髙策浪得歸湖范蠡名終古無名識是非百年髙興子陵磯沙鷗不管人間事細雨斜風自在飛玉裴仙子住山椒静夜能來不待招莫怪寒林星斗黒野人疎懶坐相邀長樂歌鍾醉五侯滄浪何似泛扁舟無人解得閒中意雲滿秋空水自流厭㸔桃李媚春陽最是秋來樂意長千㸃黄花數行栁幽居人道似柴桑野吟詩句出天成景物如雲眼底生白石江頭烏桕樹夕陽疎雨鵓鳩聲鶴背腰纒有㡬家老陶貧薄太無涯青鞋布襪歸來好却使無錢對菊花依山茅屋小於舟吟對風光憶舊逰平地白雲秋萬頃五湖烟水似揚州村醪舊甕按新篘四月蠶成麥亦收但使百年都若此吾今於世亦何求幽花滿樹酒盈樽白水斜陽度曲村曽憶少陵風雪裏也曽朝叩富兒門怪底襄陽孟浩然蹇驢衝雪踏江天無人説與寒梅樹只合開花暖閣邉幽居僻類杜陵家春日垂垂橘柚花花逕今朝縁客掃磁瓶汲水自煎茶凍露初開日暈青長松落雪報新晴茅簷聞瀑俄驚起何處鴻門碎玉聲野人於世本無營尚有閒功日計程篔竹縛梯求蜜筩連宵運水搗香秔夢覺哦詩醉後眠春來秋去緫茫然山中厯日従來少欲倩何人記嵗年本學埋名坐釣磯誰言天上客星移前灘水落西風冷覔得羊裘不敢披迴塘曲渚月明多逰女相呼采芰荷老去風情渾盡減隔花誰唱竹枝歌歸休贏得卧中林坦腹蓬頭緑樹隂非是葛巾渾忘著邇來華髮不勝簮垂栁隂隂護釣磯溪流盡處著柴扉時人莫用知名姓清世林泉老布衣為報奚童掃緑苔柴門長日便教開曉烟晴日鵲聲急應有故人天上來勲名本不到旂常徒得烟霞冷趣長林下一瓢桑落酒誰云得及市朝香書生元亦羨封侯經世才迂不自由萬一鶴書求野逸素琴重到碧山幽洪武十五年果起用青年出仕奉明君老去投簮卧白雲千載周顒風致在北山先自錯移文桂樹叢生山正幽王孫嵗暮儘優㳺不知招隠縁何事聒聒風前詠不休約客聴琴掃石臺竹門咿軋倚風開空山日暮碧雲合天外美人來不來夘酒初醒午夢餘南風入户北窓虛閒身已在羲皇上到此令人悔讀書韓子髙軒不再逢草廬長倩落花封苦無韜畧能匡世伏枕惟應愧卧龍淵明千載我知音縦有氷絃不鼓琴聞説商於尋綺角寂寥誰識古人心雲本無心偶出山幽林薄暮鳥知還如何世上驅馳子只在紅塵擾擾間故人肥馬衣輕裘意氣揚揚得自由林下雨餘苔徑滑免勞相過碧山幽多才宋玉乆能詩誤對清秋景物悲湛湛長江楓樹底扁舟正可學鴟夷最愛徉狂阮嗣宗秋懐當日賦偏工酣歌裸袒青林下晚嵗心期與爾同容得蕭閒亦已多敢論官綬與漁蓑東流逝水西流日百嵗只消如此過雨浥琪花落滿牀寂無人到讀書房閒中不覺青春過静裏方知白日長呼龍種木豈無經瘞鶴藏書亦有銘獨對梅花寫遺恨招魂未續楚騷聲露氣横山夕未晞古松枝冷鶴聲遲東林日出西溪白正是仙翁睡熟時欲鑄鍾期未買金㫁絲寒縆案頭琴虛堂月底弹清曲别鶴離鸞自賞音笑殺仙源避世翁洞門猶與世人通臨流莫種桃花樹惹得春來著處紅一自衰翁惹世譁川原錦樹斂紅霞關門不倩烟霞鎖都向春風怨物華笑殺山隂王子猷凌兢雪夜泛扁舟地爐滿著松明火芋栗香中酒一甌梅花不解十分清香影撩人說姓名林壑未忘居鼎鼐老枝留子待調羮山顛幽絶人稀到柑子隂涼客屢過不見晚來傾白墮小園當奈月明何幽幽緑樹團華盖聒聒流泉奏玉琴不必畵堂絲與竹自然山水有清音黄菊花開貧不厭茅柴酒熟醉相呼平生最愛陶彭澤風味全然似老夫栁塘昨夜雨聲急早起春水欲平橋放教汀草芊綿緑添著林花婀娜嬌春酒獨酌不成醉可憐溪上百花開花前㡬日南風𦂳門外今朝好客來如花女兒春栁腰髙歌自駕木蘭橈彎彎纔見初生月隠隠斜明第四橋鄰屋白酒近初熟老子盡日為花忙將隨粉蝶聨翩舞欲趂逰蜂上下狂不覺門外春已過只說飲酒日豪吟林花盡褪娟姢色澗竹都成密密隂初開草堂三五日池上鷗鷺日頻來桃花枝嫩未堪折楊栁隂疎還更栽江上好景莫虛度屋邉亂紅今已深不是春風相勾引道人争㸔日攜琴栢子香消晝景遲坐調元氣學希夷旁人那解𤣥中意文火温温只自知半世為儒好自輕狂歌浪謔鬭詩聲内庭消盡還丹火傳得江湖說姓名自入珠宫捧玉宸别招猿鶴作新鄰空林寂静無來客千載丹楓作老人塵縁静盡覺神清對月虛堂煉鶴形采得石橋花上露研硃自㸃石臺經羽步天壇禮帝居星文拱北似連珠寒雲不鎖丹砂井一夜虹光徹太虛煉得梅花白雪顔關元静夜浴金丹呼龍起種春田玉白日山精倚樹㸔蒲團静坐思窈𠖇清晝只誦大洞經碧壇𤣥鶴忽飛起琪花亂落風泠泠天台二月風景新石橋流水起龍鱗美人相約㸔花去雲暖洞房仙帳春丹成八極恣神逰蕋闕風隨鶴騎秋上苑㸔花猶一夢五雲囘首帝王州秋閨思四首天上姮娥也可憐廣寒宫裏夜孤眠早知人世相思苦不若移居桂樹邉涼夜簫聲處處過玉樓髙起逼天河西風瘦盡梧桐葉添得西窓月影多璧月斜明翡翠屏水花零落㸃秋螢夜闌院院垂金鎖獨立蒼苔望帝星疎櫺鐡馬亂風飄火冷金鳬百和銷怪底芙蓉清漏永不知何事苦迢迢閨怨一百二十四首憶初癡小嫁君時只道長年不暫離鴛被未寒揮别淚愁來心事倩誰知都門不去亦何妨行色匆匆有底忙欲向碧桃花樹底牽囘白馬紫逰韁别來初種小桃花艷蕋今成滿樹霞辛苦逺逰成底事半生贏得負韶華小園蝴蝶太愁儂作對雙飛趂曉風已逐黄蜂過鄰屋還隨花片入簾櫳不恨韶光似水流縁池景色自生愁門前㡬樹垂楊栁日日對啼黄栗留即黄鸝一段春愁未易裁百勞飛去燕飛來房櫳半掩東廂裏㡬度山櫻落復開家住長干白下間黄頭奴子識花顔欲趂郎船㸔明月寒潮惟到小孤還青年幾許謾狂逰一種相思兩地愁早晚郎船發揚子相迎不惮下𤓰州欲向東風訴别因四時原自不傷春熏籠靠著交疏裏婀娜濃花惱殺人新燒鉛粉作春紅病掃雙蛾淡復濃宫様雲鬟巧粧束不知愁裏為誰容怨殺聨翩白馬蹄逺馳夫壻路東西歸來繫在垂楊下踏破春風錦障泥寄語多情燕與鶯莫勞花底弄春聲千吟萬囀知何益空使寒閨夢不成阿玉雙成奉紫姑自拈香炷禮仙鳬郎騎白馬歸來日得及庭花未落無惱殺春山怨子規風前雨裏㡬凄凄如何只繞深閨樹不向逰人醉處啼晚思沉沉倦倚欄玉簫聲歇酒闌珊澹雲還掩初生月誰護梨花作夜寒睡到黄昏坐到明只縁君去没心情常時欲寄平安字及至人行寫未成别眼愁容怎地㸔任他塵撲鏡中鸞腰肢不學昭陽舞那作羅衣日日寛生兒不合住京華綺陌香衢見百花雲鬢綰成村婦様只教夫壻學農家翠竹隂中栖鳳凰緑蘋深處浴鴛鴦迢迢萬里巴江水比妾春愁分外長故國園林玉樹新路旁休戀野花春尋常世上癡兒女只重黄金不重人仙母蟠龍隠玉臺合歡羅帶下牀開深房内閣無人到怎麽春風驀地來舞女歌兒艷兩川囘裙掩面鬭婵娟那堪白馬狂逰日正是青樓薄倖年愁寂偏多感物華春寒故故入窓紗無端一夜東風起吹落庭前夜合花誰識沅湘路㡬千夢魂夜夜到君邉春光不管愁人恨故傍楓林叫杜鵑薄寒猶可夜藏鬮向晚那堪獨倚樓最是著人添懊惱海棠枝上月如鈎繡線針寒不待拈金爐香燼亦慵添月移花影偏當户風攪逰絲故入簾昨夜裙腰忽褪圍清晨蟢子繞深閨春來吉兆頻頻見定是逰人此夕歸試掃雙蛾偶便成容華今日倍分明緑楊堤上嘶春雨莫是吾家白馬聲見說新隨蜀客船亂漩渦裏下西川還聞又向瀟湘去偏是君山有夜猿夜漏沉沉似嵗長小鬟貪睡懶添香春風莫撼流蘇帳待妾分明夢一塲接得封書妾自開分明說與便歸來千囘枕上聴春雨㡬度階前掃緑苔不如嫁與弄潮兒潮去潮來自有時誰似阿歡無信準說歸長是誤歸期壓夢春愁懵不醒忽聞剥啄猛然驚羅裙旋繫開朱户原是幽禽啄木聲舊栽楊栁色毿毿千里渾忘寄一緘春雁髙飛惟向北不知逰子在江南腸㫁關山路轉迷房櫳風氣冷凄凄㡬囘愁倚髙樓望錯認行人到日西燈不成花夢欲闌素羅衾薄掩春寒忽聞風響秋千索夜半倉皇出户㸔雖縁逺别擾憂煎正合同心到百年莫學錢塘蘇小小又隨人上販茶船聞說風濤暗洞庭只將心事托神靈一爐香篆寒星下學誦蓮花妙法經月斜風細夢初囘日掩重門夜却開花影亂中人影過失驚原是小瓊來夜静焚香禮玉娥杏花涼露濕衣羅幽情不遣旁人解盡是喃喃細語多聞喚飛瓊學問禅縁何於意獨悁悁未酬前世鉛華業來結今生寂寞縁對盤雙陸打黄金掛樹朱籠賭百禽不是愛他延日子免教提起别時心殘春寂寞似深秋風滿簾櫳月滿樓一捻芳心椰子大若為装得許多愁春雲莽莽欲遮天滿眼如雲復似烟明月赶囘青嶂外長風吹到畫堂前淚似花枝雨㸃流愁如江上亂雲浮淚盈方朔三千牘愁滿瞿塘十二樓青春桃李少年時正好歡娯又别離直到紅顔都去了却來相對喜成悲莫入襄陽與洛陽綺羅勾引少年郎歌樓美酒三千斛舞榭金釵十二行青樓曲譜怨湘娥半是關山别意多愁緒春來怕絃索雪兒休更抱雲和理得粧成坐少時淚痕依舊濕臙脂從今已後無心性鉛粉常抛不要施怨女和戎黒水河玉環埋恨蜀山坡佳人薄命頭頭是比較兒身好㡬多月色花香滚滚來不容些子暫開懐杜鵑啼血方停舌芍藥移隂𦂳上堦生來自愧不為儒斂手逢人念起居空有一腔離别恨倩誰修作萬言書新愁舊恨積如林欲訴還羞復不禁安得越禽秦吉了替人終日道勞心雨態雲容惱殺人虛無似夢復疑真陳留子建多才思莫向江臯賦洛神春來道是雨浪浪却又開門見日光欲啓朱奩㸔明鏡頭風半日不成粧對花誰與擲摴蒱自倚危闌到日晡愁裏漏聲遲欲咽自傾新水入金壺記得兒孫樂事多女郎同唱採蓮歌紫騮嘶入落花去奈此空閨日暮何過從要與善為鄰况復炎涼世態新不用為他煩惱得阿歡原是讀書人為怯琵琶不忍聴龍香撥子暗塵生東墻怪底春風過又是鄰姬按玉筝細展占書繡閣前不知速喜定留連憑誰㫁得郎歸日願與金釵當卜錢遥天月暈一環紅明日商量定起風想怕玉娥心緒亂故教攔住廣寒宫已許紅絲繡鏡囊更饒金粉拭清光鏡中神聖知人意托夢兒家白馬郎别意空憑逺信傳㡬囘臨起復纒延天長白雁相將去知在南雲若箇邉黄昏也待睡些些月影撩人故故斜簾幙數重花萬疊愁來只是不能遮畵籠鸚鵡日啁啾自與離人替説愁戲擲枇杷打金羽兒夫去後憶儂否世籙文星苦不齊我辰生處直孤栖大都離合原關命錯怨車輪與馬蹄朱簾落索掉簾鈎日裏狂風夜未休花底過來吹蠟燭也如人淚一般流愁裏飛花一夕空寸心無奈倩神通閨闈不省文王易卦落誰知吉與㓙便擬招魂誦楚詞何縁生别故遲遲臨風試學巫陽些偷把鸞釵掛竹枝春宵誰道直千金妾獨愁多思不禁花月只消長惹恨管絃惟有更傷心昔聞仙客好幽棲除却清齋醉似泥生世不諧遭逺别妾身何異太常妻百年夫婦本同心舊愛新憐夢裏深料得君非題柱客枉教人賦白頭吟少日雙眸炯動人倚風囘顧頰生春無因暗滴相思淚減却秋波一半神午夢驚囘是兀誰阿儂偷捻紫簫吹寒聲未㫁腸先斷怨曲將成淚已垂過眼年光緫是愁嫌春春去淚還流荷香栁影凄涼夏月色蟲聲冷淡秋碧草初㸔上玉堦飛花又見㸃蒼苔年年好景乖人願懐抱何時得少開繡閣朝來興頗新試拈錢卜問歸人花言巧語梁間燕舊館新粧鏡裏塵怯雨愁花過一春嬌嬈半是女兒身朝來逐伴鬭百草門外天風吹倒人玉臂無人㸃守宫戲拈花瓣貼春紅香痕忽被風吹落彷彿逢君是夢中一從君去負芳春幾歎容華悞妾身也似崔徽啼别後蕭條不及巻中人供佛清齋折露葵課經時繞白蓮池雲鬟秖欠金刀剪頓是山庵苦行尼班姬紈扇奉餘恩蔡琰胡笳墜朔塵此命一生如紙薄好和孤妾是三人夜雨偏傷獨睡情芭蕉㸃㸃助寒聲分明隔著窓兒紙直向心頭滴到明村巫市媪莫相過聞汝深衷術數多心似後園金井水従來不㑹起風波採桑隨伴出城隅不謂途逢使者車錯把明粧照墟落賺他駐馬乆踟蹰年少離家志未堅閒雲賸雨滿江天舟行若過巫山渚莫向篷窓白晝眠枉控朱簾十二鈎一身何用許髙樓桃花流水隨郎去只學漁家住小舟寫得鸞箋數十言緘成不寄淚如泉瑶池欲倩西飛鳥帶到湘靈錦瑟邊窓紗雲影竹梅霖冷蕋香凝案上琴㡬日生疎絃上手愁來無地著春心心如金鈿只須堅歸早歸遲緫信天錯聴㡬聲簷外鵲朝朝江口望郎船髙堂朝夕奉姑嫜冬裏温湯夏扇涼不是西山春日薄只抛孤妾亦何妨悟透单居一味禅丹光如月静中圓人間若有蓬萊島也合乗風作女仙無非秖為隔關山若箇牽纒乆未還二十五程荆楚路順流江水霎時間臂上紅絲錦作符竈前香火玉為爐無人為起凌烟閣畵作紫姑仙女圖欲掃鸞牋冩綵雲惟將心思怨夫君蜀山花竹湘潭雨杜宇春深獨不聞婉意柔情似海深却將離索負光隂村姝野媪無風致也解團欒怨藁砧青草湖邉日欲西黄梅雨裏鷓鴣啼江南氣候春來惡莫聴寒聲助慘悽生兒豈免涉江湘身世無成恥故鄉人事由來多錯忤知君不是故相忘逺路迢迢水隔天流光冉冉箭離絃惟應自築青陽室學煉還丹駐少年薄命真成枉嫁郎嫁來三載守空房鳴鳩語燕皆求匹秋菊春蘭各自芳翻羨南鄰賣酒姬近來嫁得住家兒何常蕩著風波性步步相隨不暫離金屋長年貯阿嬌好教虛度㡬良宵尋常未嫁人家女也向深閨怨寂寥楚水呉山萬里餘兩年方見一封書都來費得鸞箋紙何處春江無鯉魚偶弄青梅凭短墻誰騎白馬傍垂楊撩雲撥雨來相擾不是巫山窈窕娘洞庭暮雨起春波翠斾金蕤帝子過遙想泊舟明月渚夜深敧枕聴雲和放著南來北去舟江波不住也東流良人解得西歸日可道相思到白頭濯錦江邉楊栁條浣沙女兒詫裙腰子規啼罷春花落遊子青驂萬里橋瞿塘猿聲天上哀白帝城下水如雷百折漩渦人鮓甕莫著郎船八月來人鮓甕在歸州湘江兒女单紵衣娥皇廟前歌竹枝春來只㑹閒相惱不管人家有别離客程愁雨復愁風君意憐儂却忘儂把似相憐不相忘只消那轉馬頭東嵗嵗年年君去家年年嵗嵗樹開花年年君去無消息嵗嵗花開感物華寂寂寥寥紙半張嗟嗟嘖嘖淚千行言言語語空相憶苦苦頻頻更寄將别恨過於别緒濃背身斜著倚東風庭前徧是春花樹樹樹花開枝上紅對月臨風不自由都縁觸景便生愁春來總是相思夜夜夜相思月滿樓暗卜街頭好㡬囘連連去語道來來當樓素月明於練一任房櫳徹夜開靈鵲朝來噪屋山奚童先背錦嚢還銀鞍隠隠穿青栁珠淚滋滋濕玉顔春鉛數日不曽施貼翠塗黄只半時為報小鬟休冩月且教留著澹雙眉相逢錯愕喜傷神臨到相親且未親清夜已涼猶秉燭對君疑是夢中人執手翻成喜極悲到來嗚咽淚沾衣流光去去不相待落盡春紅君始歸去年記得打春牛夫壻歸來上翠樓醉把春泥揮綵筆引教春色上簾鈎訪某駙馬不遇題壁青春駙馬不還家公主傳宣坐賜茶十二碧欄春似海隔窻閒殺碧桃花闕門書所見隠隠旌旗颭落暉方山遥望錦城圍平蕪一帶香塵合知是諸王射獵歸五言絶句一首臨刑口占鼉鼓三聲急西山日又斜黄泉無客舍今夜宿誰家明興雜記云髙皇誅藍玉籍其家凡有隻字徃來皆得罪蕡因與玉題一畵故殺之此詩乃絶命詞也髙皇問監殺指揮孫蕡死時何語指揮以此詩對髙皇怒云彼有此好詩汝乃不復奏而殺之何也竟殺指揮郡邑傳皆謂蕡死以梅思祖非藍玉豈雜記别有考與今頌此詩蕡可謂一死生而髙皇亦憐才矣西菴集巻七
