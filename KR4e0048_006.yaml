body:
  text: 西菴集巻六明孫蕡撰七言律之官平原留别諸老朱衣和淚别龍庭瘦馬嘶風出鳳城托迹禁幃原已重之官名邑未全輕驅馳秪笑儒生拙憫念難忘聖主情後夜玉堂清漏永紫薇花月向誰明别妓驪駒西上帝皇州斜抱雲和淚暗流子夜歌詞翻白雪殘春風物似清秋青鸞信㫁陽臺路翠被香寒燕子樓七十二泉縈别恨濟南烟樹緑幽幽江上江上青楓初著花客㠶和月宿蒹葭過雲踈雨數千㸃臨水小村三四家風起漁船依釣石潮囘歸雁認平沙秋懐已向南天盡又是滄洲閲嵗華金山寺𤣥洲貝闕爛相輝夾岸人家對敞扉四壁波濤長觸石孤山花木自成圍横江鶴向揚州去泛櫓僧従建業歸遷客憑䦨重囘首蓬萊雲氣曉熹微送牛應祥都閫将軍淮北分符地正在隋家古汴河别館芙蓉飄繡帽御堤楊栁映雕戈彊兵戍久通蕃語降豎年深解漢歌此去㸔花朝上國春風天上聴鳴珂髙郵山日未出煙𣺌茫髙郵放船催下江揺櫓唱歌白鷂子過湖打鼓黄頭郎鳥拖雲葉低貼水魚噀浪花髙接窓微官所得㡬何計吟鬢四十今蒼蒼秋風秋風淅淅吹屛山汴河之水聲潺潺歸雲一似宦情薄飛雁不将鄉信還千峯澹對寂寞景孤客况棲羇旅間且可狂歌對樽酒未須慘戚懐江關秋風淅淅吹江亭汴河之栁猶青青黄姑東渡㑹七夕白帝西來朝百靈初開琪樹已云落逺别客愁今未醒欲冩鄉書寄南雁故園萬里天㝠㝠虹縣九日登五女塚三首肺氣經秋久未平佳辰酌酒㸔君傾雨催黄菊非無意風落烏紗最有情仙客此時緱嶺上彩鸞何處玉簫聲逶遲未就丹砂術俛仰微官愧此生老去佳辰得㡬逢登臨此㑹歎匆匆雲來汴水波光白日落屛山樹杪紅抱病獨憐貧子美休官惟羨老陶翁遥知弟妹家山裏㡬向天涯倚㫁鴻五女峯頭烟樹荒登臨聊得散徜徉忽驚重九今朝是却憶三千客路長冷露餘花偏有色朔雲㫁雁不成行寜教醉裏逢佳節且免醒來望故鄉淮上憶京去嵗茲辰客帝畿蒋陵西曲雁飛飛秋風叢菊開荒逕落日浮雲滿翠微老去吟邊芳物改别來天上故人稀登臨復對青樽酒醉倚淮山憶禁闈清河口清河黄河相間流四月五月如九秋墨雲壓地箕斗黑濁浪吐雪龍魚愁江河萬里杳何極行役半生猶未休故園清興自不淺此日松竹風颼颼圯上懐古草没荒臺烟樹踈維舟凝眺久踟躇凌波見説求仙履博浪曽聞誤副車勲業赤龍三尺劔風雲黄石一編書獨憐衣赭人如玉鴻鵠歌殘怨有餘過三洪官舟已落三洪口猶在飛流澒湧間放棹忽聞過亂石開窓始覺慰愁顔雲連雪浪瞿塘峽樹隠青泥古劔關謾有微吟追太白此身疑謫夜郎還過吕梁二月三月寒尚饒上洪下洪春雪消奔霆出地星火裂吼浪觸石黿鼉驕晨昏霧底蒼水佩明滅雲中丹鳳簫靈風為我送歸棹故國越海天迢迢帝子彭城三月風氣和吕梁雪消春水多濁霧蟠空作飛雨崩濤薄岸成盤渦鮫人珠佩影明滅龍女金支光盪摩故山雲物㡬時見遷客此地長經過徐州洪二首吕梁積石天峥嶸徐州上洪波稍平蛟龍怒巻四時雨砥柱亂落三秋星辛夷杜若散洲渚貝闕珠宫開窈冥舟人倚棹笑相語九里山色連彭城龍門鐡石倚天開彷彿瞿塘灧澦堆萬里江風來灝氣九秋晴雪迸驚雷層隂水府和雲見濁浪漩渦劃岸迴小艤扁舟待明發霸王臺下乆徘徊漢祖廟長陵見說石麟荒遺廟丹青野水旁古劍星光時出沒大風雲氣尚飛楊三秦寳鼎垂鴻業萬嵗英魂戀故鄉莫怪憑髙重囘首楚臺烟樹鬱青蒼歌風臺漢陵秋樹起蒼煙故里髙臺夕照邉逐鹿洪圖今已矣歌風遺跡尚依然赤松人去封留候夢澤雲浮狩楚年可是君王思猛士青峯和雪暗遙天戲馬臺盖世英雄亦壮哉古河三面對荒臺漢家陵闕迷春雨嬴國江山起暮埃雄劍昔年金鏉鏽龍媒此日錦毰毸鄉雲一笑山花動疑是君王衣繡來范増墓舊識荆州老將名秋風此日過佳城羣雄逐鹿留遺跡稚子求羊入廢塋玉斗有聲松雪落蒼精無影石麟横可憐牢落祥雲氣又向芒碭谷口生過黄石公祠塵編寥落千秋事野客停舟問隠居煙月髙名興漢後風雲逺畧避秦餘赤松仙子依丹室黄石山精䕶素書嵗晚圯橋風物改泥中履迹近何如過髙唐瘦馬嘶春北郭門郡城茅屋似山村荒墳肹子雄風在野曲緜駒舊譜存霏霧出林銷殺氣行雲駐彩閣朝昏千年往事今塵土寥落幽花酒一樽客平原春日有懐悵望鄉園去計違春來惟有思依依客程故向南天逺花信偏於北地遲漢帝苑邉盧橘熟秦佗墓上鷓鴣飛柴門獨對東風掩此日松筠冷翠微宿髙彬第夜宿故人孤旅邸更深華月滿晴空朋游動是經年别樽酒寜知此㑹同上國鸎花明戚里故山松栢語天風豪吟未覺清狂盡醉裏詩成氣吐虹挽夏尚忠疋馬江南更度關寒雲撩亂撲燕山故鄉風物頻囘首同輩衣冠竟厚顔使節謾隨征雁逺宦情長似野鷗閒黄灣緑水深千尺此日西風旅櫬還送陳御史孟陽之官三河㡬年文墨侍彤闈妙句曽㸔對御題翠栢臺前聴雨漏金蓮炬底立霜蹄當時意氣青雲動此日棲遲皂帽低歧路相逢又相别灤河煙樹冷凄凄贈楊主簿時為金銀閘垻官天台人寥落清秋老孟嘉向風長是整烏紗西江見説詩無敵東郡誰憐鬂有華金垻晚飛湖上雨巾峯晴漾海門霞微官未遂清逰願辜負仙桃㡬樹花黄河四月動官舟河上梁山紫翠浮馬頰餘波衝岸㫁龍門殘雪帶星流熹微曙氣鄉心逺颯遝凉風鬂影秋遥憶釣魚洲渚上㡬畨吟興負沙鷗古河蕭關之北黄河流昔時禹蹟今成丘荒碑苔蘚不辨色古水蛟龍猶有湫野人千載見清淺海宇萬里無戈矛明當作頌獻天子髙鐫寳册埀鴻猷出關忘却㸔花上帝都出關猶記佩兵符龍歸古寺雲初定鳥落寒灘水半枯萬古文章關氣運十年風雪老頭顱憑將翠管三千牘換取黄柑二百株冬至朝來喜色動鍾山雲氣從龍杳靄間宫扇影揺春仗下佩環聲散早朝還書祥謾有三千牘獻頌長違咫尺顔已擬隂何同結社遍題新句老江關思家京華薄宦已沾巾寥落三年濟水濵冷雨青燈吟客夢東風蓬鬂異鄉人雲濤𣺌𣺌滄江暮榆栁依依旅邸春朋舊别來多野興故園應已賞芳辰南昌鐡柱觀琳宫石筍露岧嶤云是千年此鎮妖方外羽衣能濟世城中仙甃亦通潮蛟龍水底蟠金鎖雞犬雲間聴玉簫行槖已垂思㸃石祈靈壇上倚逍遥十八灘五城一别二千里孤棹重經十八灘拍岸怒濤雷噴薄横江亂石鐡巉岩天隂紫蜃籠商軸夜冷蒼龍吼劒關猶記平南諸將下樓船此地凱歌還寄髙彬二首與君夙有通家好堂上嚴親未白頭野寺花明春載酒清溪月朗夜浮舟陶潛此日生歸思屈子長年賦逺遊煙水五湖歸棹早為余開逕碧林幽蟾溪溪頭春水生故人卜築茆堂清開門雨過芳樹緑對酒風來幽鳥鳴我纒薄宦去鄉國君亦久客留天京未知何日遂歸計重結漁郎鷗鷺盟采石太白墓冠屨何年墮世塵先生元是謫仙人春雲彩筆驚飛燕暮雨滄江泣石麟牢落清名元不没衰遲大雅竟難陳翛然我亦狂吟客思殺風流賀季真次黄州日落放船鸚鵡洲漢陽烟白樹幽幽江豚數起浪花夕野鶴一聲山木秋㠶影掠雲過赤壁櫓聲揺月下黄州何因散髮林臯下得似蘇仙爛漫遊望廬山二首扁舟夜泊潯陽岸隠約香爐五老巔紅葉天燈飛烏外白蓮僧社斷猿邉蒼崖影合東林寺銀漢光連瀑布川亦有宗雷遺世想千峯無路訪羣仙東林佛閣倚岧嶤蘿逕逶迤傍石橋松柏千章連左蠡芙蓉萬疊倚層霄琪花雪影江心見蓮社天香世外飄歸老倘酬仙賞願籃輿寜待逺公招至儲潭廟留題五老峯微楚路分贑灘猶禮洞庭君行空鐡馬寒嘶霧帶月蒼龍夜吼雲瓊佩倩誰招帝女桂漿聊復奠靈氛清吟寄逺成孤絶思入滄江白雁羣過岳州𣺌𣺌孤舟江漢間嵗華揺落鬢毛斑裁成方朔三千牘博得瞿塘十二灘峽口瘴深迷岳渚洞庭風順過君山無端又是重陽節起對黄花一破顔巫峽秋懐淅淅金風霄漢間火雲猶自繞巫山雨餘神女收旌斾月朗明妃響佩環萬頃波光人鮓甕一天秋色鬼門關吟魂未向三巴㫁尚逐東吳畵舸還八陣圖連灧澦堆永安宫下水縈廻風雲舊磧森猶列行在荒臺乆已頽鐡馬躍雲嘶凍雨木牛遺恨吼驚雷英雄一去今千載殘照西風首重囘漢相祠西江水煙晚風平楚送歸船千重古錦雲端石一帶空青峽裏天詩思每懐秋放鶴客心那更夜聞鵑憑誰為寫髙唐賦譜作朝雲蜀國絃懐四川二首蜀城風物冷凄凄馬上哦詩日向西雪嶺氷融春水緑錦江花落子規啼卧龍祠廢碑横草杜老堂空雨漲溪囘首勝遊成往事倚風吟㫁意俱迷草堂烟樹入青霄漢殿荒臺秀黍苗宇宙詩名今尚在風雲霸氣未全消寒星夜落支機石錦水春明駟馬橋花栁舊遊今㡬載西風蓬鬂影蕭蕭懐羅浮寄蕭鍊師誤解蘭纓下彩峯十年飄泊厭西東秋風楚塞塵隨馬夜雨吳江浪打篷旅邸寂寥芳嵗換仙遊爛漫幾時同羅浮此日南薫轉無數澷山荔子紅訪單孟雄不遇不見龍灘單孟雄欲従山蘚覔行蹤門前烏桕經霜紫樹杪青霞著日紅蠟屐定過蝴蝶洞竹門長掩鷓鴣峯桃花流水仙源近嵗晚漁郎或再逢曽氏耆夀翁詩詞林每憶鄉園友曽是才名動縉紳觀國倦騎沙苑馬幽棲長戴華陽巾芙蓉火足龍蟠鼎松樹天寒鶴近人天上歸來今白髮泉南水竹願為鄰懐萬修撰謫遼東二首垂老謫官瀛海上驚聞嗚咽淚沾巾長憐偃蹇難堪俗豈信文章解悞身賦鵩㡬年留賈誼懐沙此日弔靈均無勞更用悲萍梗見説皇家雨露勻聞君逺謫三韓去萬里天風裂素衣聖世君恩殊未薄畏途吾道一何微金蓮炬暗梅花落鴨緑江寒雁影稀我亦漂流向滄海相思何處不依依奉寄文淵學士吳公翰苑摛文沐寵多遥聞近侍在鑾坡讜言屢進分香日直筆常濡太液波入相内庭稱褚亮薦賢當路説常何獨憐落職東遷客逺道西風鬂欲皤懐朱太史芾宋舍人璲誰憐飄泊向江關獨倚長風憶妙顔老我黄塵三楚外羨君華藻五雲間清時步武蜚聲蚤晚歳逶迤奏牘閑鍾阜冶城蒼翠裏何由更得共躋攀懐掲孟固弱水神山路𣺌然欲從何處問羣仙金門正合容方朔滄海寜當老鄭䖍白玉堂前秋月冷紫薇花上曉風顛吟魂想挹天光近鳳尾游絲五色鮮懐碧虛觀寄止菴蕭鍊師四首安期臺下蕋珠宫舊雨題詩紫翠中五夜丹光虹貫日四山松樹鶴呼風雲深洞口藏金母嵗乆林楓化玉童吟客逺遊仙子去錦桃春晚為誰紅飛泉作雨落寒岩蕋闕凌天起翠嵐禹柏千年青藹藹堯蒲九節玉毿毿天游别我知誰共世故撩人秖自慚雲月舊盟應未冷可能相待解朝簮平生最有滄洲趣一住三吳十二年愁逐亂雲生隠隠夢隨孤鶴去翩翩尋真謾爾懐仙侣鍊藥憑誰授秘編目㫁南雲心欲絶秖今無計脱塵縁前身恐是臨臯鶴長占烟霞物外交㡬向滄洲乗野艇更依蓬島結書巢千年果熟雲明樹五粒松寒露滴梢為報羅浮蕭羽士好開蘿逕碧山凹思家古河古河烟草暗南天此去鄉園路幾千燕子來時春寂寂海棠開後雨綿綿滄江水遶吟詩社緑渚花明載酒船更憶故人王給事愁來書破薛濤箋悶興無奈客愁愁不醒誰憐新舍在南溟佳人花底占烏鵲令弟沙邊喚鶺鴒庾嶺南來雲漠漠清江東下雨𡨕𡨕㡬囘吟罷空惆悵謾對寒梅倒醁􅌬觀海海上蟠桃冬著花蓬壺髙處敞仙家天寒霧雨籠鮫室夜乆星辰泊釣槎神女步蓮珠結鳳醉翁題竹墨淋鴉連鰲未試任公手欲借前籌紀嵗華戍遼渡海二首天風萬里噀洪濤驚見神峯立巨鰲綘節影揺龍伯國繡幢光拂海鳬毛浮空員嶠隨波長繞石珊瑚出浪髙儻許從戎樹勲業白頭歸路擁旌旄清詩字字盡琅玕水底蛟龍夜起看未結柳船驅五鬼又將蓬髩犯三韓靈筌降夕通仙語海屋添籌紀嵗闌萬里封侯期可遂春風笳鼓入長安渡海呈同逰同來文章諸鉅公昔時作宦今從戎不論西蜀與東廣共渡北海期南風將軍錦帶佩雙虎左校寳刀藏一龍明年奏凱答神貺羽書歸奏蓬萊宫沙門島三首白銀堆裏湧仙臺嵗晚登臨亦壯哉妖蜃吐煙成海市巨鰲擎石作蓬萊金蕤翠羽空中見貝闕珠宫水底開凱奏北旋應有日同逰俱是濟時才立占滄溟碧玉簮蜃樓髙過百花岩興來落筆才無敵老去從戎力尚堪詩巻長年留海内夢魂清夜繞江南綸音早晚需前席日望登萊使者驂沙門滄洲洲上山九河碣石髙巉岩雲來氣通巫女峽月出光映藍田關宫前彩鳳駕車下祠底白龍行雨還浴鳬飛鷺立沙際疑是青瑣晨朝班與謝縣丞坡山聨句㡬年來作交州客今日方登第一樓謝萬頃煙波涵碧落四山雲氣藹清秋孫瑶臺鶴駕排空下石室丹光傍井浮謝蓬島依微天路近凌風直欲訪丹丘孫送董文啓出宰江夏委珮晨㸔拜玉除西逰真食武昌魚王孫碧草秋無際仙掌金莖露下初今日才名須卓茂當年詞賦説相如登臨若對南樓月待爾賔鴻寄尺書挽李樵雲相國靈轝閟九京桓桓松柏表佳城風雲已際興王運雨露偏傷孝子情一代文章遺汗簡千秋彞鼎勒勲名平原賔客今誰在獨寫椒漿帶淚傾西菴集巻六
